# =============================================================================
# COAL LIMS - Docker Compose Configuration
# Production-ready with PostgreSQL, Redis, Nginx
# =============================================================================
version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # Web Application
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coal_lims_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://lims_user:${DB_PASSWORD:-lims_password}@db:5432/coal_lims
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?Secret key required}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./instance:/app/instance
      - ./logs:/app/logs
      - ./backups:/app/backups
      - uploads:/app/app/static/uploads
    restart: unless-stopped
    networks:
      - lims_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: coal_lims_db
    environment:
      POSTGRES_DB: coal_lims
      POSTGRES_USER: lims_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lims_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - lims_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lims_user -d coal_lims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Production-д энэ port-г хаах
    # ports:
    #   - "5432:5432"

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: coal_lims_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - lims_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Production-д энэ port-г хаах
    # ports:
    #   - "6379:6379"

  # ---------------------------------------------------------------------------
  # Celery Worker (Background Tasks)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coal_lims_celery
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://lims_user:${DB_PASSWORD:-lims_password}@db:5432/coal_lims
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:?Secret key required}
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - uploads:/app/app/static/uploads
    restart: unless-stopped
    networks:
      - lims_network

  # ---------------------------------------------------------------------------
  # Celery Beat (Task Scheduler)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coal_lims_beat
    command: celery -A celery_worker.celery_app beat --loglevel=info
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://lims_user:${DB_PASSWORD:-lims_password}@db:5432/coal_lims
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:?Secret key required}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lims_network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (Optional - production)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: coal_lims_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/usr/share/nginx/html/static:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - lims_network
    profiles:
      - production

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  lims_network:
    driver: bridge
