# docker-compose.yml
version: '3.8'

services:
  web:
    build: .
    container_name: coal_lims_web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://lims_user:lims_password@db:5432/coal_lims
      - SECRET_KEY=${SECRET_KEY}
      - MAIL_SERVER=${MAIL_SERVER}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    depends_on:
      - db
    volumes:
      - ./instance:/app/instance
      - ./logs:/app/logs
      - ./backups:/app/backups
    restart: unless-stopped
    networks:
      - lims_network

  db:
    image: postgres:15-alpine
    container_name: coal_lims_db
    environment:
      POSTGRES_DB: coal_lims
      POSTGRES_USER: lims_user
      POSTGRES_PASSWORD: lims_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    networks:
      - lims_network
    ports:
      - "5432:5432"

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: coal_lims_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app/static:/usr/share/nginx/html/static:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - lims_network

volumes:
  postgres_data:
    driver: local

networks:
  lims_network:
    driver: bridge
