# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

# Line length 120 - олон проект ашигладаг стандарт
line-length = 120

[lint]
# SQLAlchemy query-д == None, == True/False зөв учир ignore хийх
ignore = [
    "E711",  # Comparison to None (SQLAlchemy-д зөв)
    "E712",  # Comparison to True/False (SQLAlchemy-д зөв)
    "E402",  # Module import not at top (Blueprint pattern)
]

# E701, E702 style - хэвээр шалгах
select = ["E", "F", "W"]
