worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Хэт том request хориглох (16MB хүртэл — файл upload-д)
    client_max_body_size 16M;

    # Gzip шахалт (хуудас хурдан ачаалагдана)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # Аюулгүй байдлын толгой
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limit (DDoS хамгаалалт)
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream lims_app {
        server web:5000;
    }

    server {
        listen 80;
        server_name _;

        # Static файлууд (CSS, JS, зураг) — Nginx шууд өгнө (хурдан)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Login хуудас — хатуу rate limit
        location /login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://lims_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (чат, real-time шинэчлэл)
        location /socket.io/ {
            proxy_pass http://lims_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # Бусад бүх хүсэлт
        location / {
            limit_req zone=general burst=50 nodelay;
            proxy_pass http://lims_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
        }
    }
}
