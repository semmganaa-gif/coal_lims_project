# Promtail Configuration
# Log collector for Coal LIMS

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Coal LIMS application logs
  - job_name: lims
    static_configs:
      - targets:
          - localhost
        labels:
          job: coal-lims
          __path__: /var/log/lims/*.log

  # Flask/Gunicorn access logs
  - job_name: flask
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask
          __path__: /var/log/lims/access.log

  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339
