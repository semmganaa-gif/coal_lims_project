# Coal LIMS Alert Rules
groups:
  - name: lims_alerts
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: rate(flask_http_request_total{status=~"5.."}[5m]) / rate(flask_http_request_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # Slow response time
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow response time"
          description: "95th percentile response time is {{ $value }}s"

      # Application down
      - alert: LIMSDown
        expr: up{job="coal-lims"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Coal LIMS is down"
          description: "The Coal LIMS application has been down for more than 1 minute"

      # High memory usage (if available)
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB"

      # QC failures spike
      - alert: QCFailureSpike
        expr: rate(lims_qc_checks_total{result="fail"}[15m]) > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "QC failure rate is high"
          description: "QC checks are failing at an elevated rate"

      # Database slow queries
      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(lims_db_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries"
          description: "95th percentile DB query time is {{ $value }}s"

  - name: lims_capacity
    rules:
      # High sample registration rate
      - alert: HighSampleRate
        expr: rate(lims_samples_total[1h]) > 100
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "High sample registration rate"
          description: "Samples are being registered at {{ $value }}/hour"

      # Analysis backlog
      - alert: AnalysisBacklog
        expr: lims_analysis_total{status="pending"} > 500
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Large analysis backlog"
          description: "{{ $value }} analyses are pending"
