# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'Coal LIMS Dashboards'
    orgId: 1
    folder: 'LIMS'
    folderUid: 'lims'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
