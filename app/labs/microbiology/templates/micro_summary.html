{% extends "base.html" %}

{% block title %}Микробиологийн нэгтгэл{% endblock %}

{% block content %}
<style>
  .summary-wrap {
    min-height: calc(100vh - 120px); padding: 1.5rem;
    background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 30%, #f0fdf4 60%, #f8fafc 100%);
    background-attachment: fixed;
  }
  .summary-header {
    background: linear-gradient(135deg, rgba(32,201,151,0.1), rgba(20,184,166,0.08));
    backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.4);
    border-radius: 24px; padding: 1.5rem 2rem; margin-bottom: 1.5rem;
    box-shadow: 0 4px 24px rgba(32,201,151,0.1);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .summary-header h1 {
    font-size: 1.5rem; font-weight: 800; margin: 0;
    background: linear-gradient(135deg, #20c997, #14b8a6, #0d9488);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .summary-tabs .nav-link {
    font-weight: 600; color: #64748b; border-radius: 12px; padding: 0.5rem 1.25rem;
  }
  .summary-tabs .nav-link.active {
    background: linear-gradient(135deg, #20c997, #14b8a6); color: #fff;
    box-shadow: 0 4px 12px rgba(32,201,151,0.3);
  }
  .summary-table-wrap {
    background: rgba(255,255,255,0.85); backdrop-filter: blur(16px);
    border: 1px solid rgba(148,163,184,0.15); border-radius: 20px;
    padding: 1.5rem; box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }
  .summary-table { width: 100%; font-size: 0.82rem; border-collapse: collapse; }
  .summary-table th, .summary-table td {
    border: 1px solid #d1d5db; padding: 0.45rem 0.6rem; text-align: center; vertical-align: middle;
  }
  .summary-table thead th {
    background: #f1f5f9; font-weight: 700; color: #334155;
  }
  .summary-table .std-row th {
    background: #e8f5e9; font-weight: 600; color: #2e7d32; font-size: 0.75rem;
  }
  .summary-table .limit-row th {
    background: #fff8e1; font-weight: 600; color: #e65100; font-size: 0.78rem;
  }
  .summary-table td { background: #fff; }
  .summary-table tbody tr:hover td { background: #f0fdfa; }
  .summary-table td.over-limit { background: #fee2e2 !important; color: #dc2626; font-weight: 700; }
  .empty-msg { text-align: center; padding: 3rem 1rem; color: #94a3b8; font-size: 0.95rem; }
  .spinner-wrap { text-align: center; padding: 3rem; }
  .table-responsive { overflow-x: auto; }
</style>

<div class="summary-wrap">
  <div class="summary-header">
    <h1><i class="bi bi-table me-2"></i>Микробиологийн нэгтгэл</h1>
    <a href="{{ url_for('microbiology.micro_hub') }}" class="btn btn-sm btn-outline-secondary">
      <i class="bi bi-arrow-left me-1"></i>Буцах
    </a>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-pills summary-tabs mb-3" role="tablist">
    <li class="nav-item">
      <button class="nav-link active" data-cat="MICRO_WATER" data-bs-toggle="pill">Ус</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-cat="MICRO_AIR" data-bs-toggle="pill">Агаар</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-cat="MICRO_SWAB" data-bs-toggle="pill">Арчдас</button>
    </li>
  </ul>

  <div class="summary-table-wrap">
    <div id="tableContainer">
      <div class="spinner-wrap">
        <div class="spinner-border text-success" role="status"></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  /* ===== Ус ===== */
  const WATER_HEADER = `
    <tr>
      <th rowspan="6">Д/д</th>
      <th rowspan="6">Сорьцын дугаар</th>
      <th colspan="2">Шинжилгээ</th>
      <th rowspan="6">Сорьцын нэр</th>
      <th colspan="5">Шинжилгээний үзүүлэлт</th>
    </tr>
    <tr>
      <th rowspan="5">Эхэлсэн</th>
      <th rowspan="5">Дууссан</th>
      <th colspan="3">CFU</th>
      <th rowspan="2">E.coli</th>
      <th rowspan="2">Salmonella.spp</th>
    </tr>
    <tr class="std-row">
      <th colspan="3">/MNS ISO 6222:1998/</th>
    </tr>
    <tr class="std-row">
      <th colspan="5">Зөвшөөрөгдөх хэмжээ /MNS 0900:2018/</th>
    </tr>
    <tr class="limit-row">
      <th colspan="3">1 мл-т 100</th>
      <th>100 мл-т Илрэхгүй</th>
      <th>25 мл-т Илрэхгүй</th>
    </tr>
    <tr>
      <th>22°C</th>
      <th>37°C</th>
      <th>Дундаж</th>
      <th></th>
      <th></th>
    </tr>`;
  const WATER_STD_ROW = `
    <tr class="std-row">
      <th></th><th></th><th></th><th></th><th></th>
      <th>/MNS ISO 6222:1998/</th><th>/MNS ISO 6222:1998/</th>
      <th>/MNS ISO 9308-1:1998/</th><th>/MNS ISO 19250:2017/</th>
    </tr>`;
  const WATER_LIMIT = `
    <tr class="limit-row">
      <th></th><th></th><th></th><th></th><th></th>
      <th>1 мл-т 100</th><th>1 мл-т 100</th>
      <th>100 мл-т Илрэхгүй</th><th>25 мл-т Илрэхгүй</th>
    </tr>`;
  const WATER_KEYS = ['lab_id','start_date','end_date','sample_name','cfu_22','cfu_37','cfu_avg','ecoli','salmonella'];

  /* ===== Агаар ===== */
  const AIR_HEADER = `
    <tr>
      <th rowspan="4">Д/д</th>
      <th rowspan="4">Сорьцын дугаар</th>
      <th colspan="2">Шинжилгээ</th>
      <th rowspan="4">Сорьцын нэр</th>
      <th colspan="2">Шинжилгээний үзүүлэлт</th>
    </tr>
    <tr>
      <th rowspan="3">Эхэлсэн</th>
      <th rowspan="3">Дууссан</th>
      <th>CFU</th>
      <th>Staphylococcus.spp</th>
    </tr>
    <tr class="std-row">
      <th>/MNS 5484:2005/</th>
      <th></th>
    </tr>
    <tr class="limit-row">
      <th>1м³-д &lt;50</th>
      <th>Илрэхгүй</th>
    </tr>`;
  const AIR_KEYS = ['lab_id','start_date','end_date','sample_name','cfu_air','staphylococcus'];

  /* ===== Арчдас ===== */
  const SWAB_HEADER = `
    <tr>
      <th rowspan="4">Д/д</th>
      <th rowspan="4">Сорьцын дугаар</th>
      <th colspan="2">Шинжилгээ</th>
      <th rowspan="4">Сорьцын нэр</th>
      <th colspan="3">Шинжилгээний үзүүлэлт</th>
    </tr>
    <tr>
      <th rowspan="3">Эхэлсэн</th>
      <th rowspan="3">Дууссан</th>
      <th>CFU</th>
      <th>E.coli</th>
      <th>Salmonella.spp</th>
    </tr>
    <tr class="std-row">
      <th>/MNS 6410:2018/</th>
      <th></th>
      <th></th>
    </tr>
    <tr class="limit-row">
      <th>50 см²-т 100</th>
      <th>Илрэхгүй</th>
      <th>Илрэхгүй</th>
    </tr>`;
  const SWAB_KEYS = ['lab_id','start_date','end_date','sample_name','cfu_swab','ecoli_swab','salmonella_swab'];

  /* ===== Зөвшөөрөгдөх хэмжээ ===== */
  // numeric: утгаас хэтэрвэл улаан
  // detect: "Илрэсэн" эсвэл тоо >0 бол улаан
  const LIMITS = {
    MICRO_WATER: {
      cfu_22:     { type:'numeric', max: 100 },
      cfu_37:     { type:'numeric', max: 100 },
      ecoli:      { type:'detect' },
      salmonella: { type:'detect' },
    },
    MICRO_AIR: {
      cfu_air:       { type:'numeric', max: 50 },
      staphylococcus:{ type:'detect' },
    },
    MICRO_SWAB: {
      cfu_swab:        { type:'numeric', max: 100 },
      ecoli_swab:      { type:'detect' },
      salmonella_swab: { type:'detect' },
    },
  };

  function isOverLimit(cat, key, val) {
    const lim = (LIMITS[cat] || {})[key];
    if (!lim || val == null || val === '') return false;
    if (lim.type === 'numeric') {
      const n = parseFloat(val);
      return !isNaN(n) && n > lim.max;
    }
    if (lim.type === 'detect') {
      const s = String(val).trim().toLowerCase();
      if (s === 'илрэсэн' || s === 'detected' || s === '+') return true;
      const n = parseFloat(val);
      return !isNaN(n) && n > 0;
    }
    return false;
  }

  const TABS = {
    MICRO_WATER: { header: WATER_HEADER, keys: WATER_KEYS },
    MICRO_AIR:   { header: AIR_HEADER,   keys: AIR_KEYS },
    MICRO_SWAB:  { header: SWAB_HEADER,  keys: SWAB_KEYS },
  };

  const container = document.getElementById('tableContainer');

  // sample_code: "01_01_нэр_2026-02-02" → lab_id: "01_01", sample_name: "нэр"
  function parseSampleCode(code) {
    if (!code) return { lab_id: '', sample_name: '' };
    // Формат: XX_YY_нэр_YYYY-MM-DD
    const m = code.match(/^(\d{2}_\d{2})_(.+)_(\d{4}-\d{2}-\d{2})$/);
    if (m) return { lab_id: m[1], sample_name: m[2] };
    // Хуучин формат: нэр_YYYY-MM-DD (лаб дугааргүй)
    const m2 = code.match(/^(.+)_(\d{4}-\d{2}-\d{2})$/);
    if (m2) return { lab_id: '', sample_name: m2[1] };
    return { lab_id: '', sample_name: code };
  }

  function renderTable(rows, cat) {
    const cfg = TABS[cat];
    if (!rows || rows.length === 0) {
      container.innerHTML = '<div class="empty-msg"><i class="bi bi-inbox me-2"></i>Үр дүн олдсонгүй</div>';
      return;
    }
    // sample_code задлах + дундаж тооцоолох
    rows.forEach(r => {
      if (!r._parsed) {
        const p = parseSampleCode(r.sample_code);
        r.lab_id = r.lab_id || p.lab_id;
        r.sample_name = r.sample_name || p.sample_name;
        // CFU дундаж
        const v22 = parseFloat(r.cfu_22), v37 = parseFloat(r.cfu_37);
        if (!isNaN(v22) && !isNaN(v37)) r.cfu_avg = Math.round(((v22 + v37) / 2) * 100) / 100;
        r._parsed = true;
      }
    });

    let html = '<div class="table-responsive"><table class="summary-table"><thead>';
    html += cfg.header;
    html += '</thead><tbody>';
    rows.forEach((r, i) => {
      html += '<tr>';
      html += '<td>' + (i+1) + '</td>';
      cfg.keys.forEach(k => {
        const v = r[k] != null ? r[k] : '';
        const cls = isOverLimit(cat, k, v) ? ' class="over-limit"' : '';
        html += '<td' + cls + '>' + v + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    container.innerHTML = html;
  }

  function loadCategory(cat) {
    container.innerHTML = '<div class="spinner-wrap"><div class="spinner-border text-success" role="status"></div></div>';
    fetch('/labs/microbiology/api/load_batch?category=' + cat)
      .then(r => r.json())
      .then(data => { renderTable(data.rows || [], cat); })
      .catch(() => { container.innerHTML = '<div class="empty-msg text-danger">Алдаа гарлаа</div>'; });
  }

  document.querySelectorAll('.summary-tabs .nav-link').forEach(btn => {
    btn.addEventListener('click', function(){
      document.querySelectorAll('.summary-tabs .nav-link').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      loadCategory(this.dataset.cat);
    });
  });

  loadCategory('MICRO_WATER');
})();
</script>
{% endblock %}
