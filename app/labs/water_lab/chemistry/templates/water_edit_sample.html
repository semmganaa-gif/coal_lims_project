{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
  <h4 class="fw-bold mb-3">
    <i class="bi bi-pencil-square me-2 text-info"></i>"{{ sample.sample_code }}" дээж засах
  </h4>
  <hr>
  <form action="" method="post" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
      <label for="sample_code" class="form-label fw-bold">Дээжний код:</label>
      <input type="text" id="sample_code" name="sample_code"
             value="{{ sample.sample_code }}" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Шинжилгээний даалгавар:</label>
      <div class="border rounded p-3" style="max-height: 300px; overflow-y: auto;">
        <div class="row">
          {% for at in analyses_list %}
          <div class="col-md-6 col-sm-6">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="analyses"
                     value="{{ at.code }}" id="a-{{ at.code }}"
                     {% if at.code in current_analyses %}checked{% endif %}>
              <label class="form-check-label" for="a-{{ at.code }}">
                {{ at.name }} ({{ at.code }})
              </label>
            </div>
          </div>
          {% else %}
          <p class="text-muted">Шинжилгээний төрөл олдсонгүй.</p>
          {% endfor %}
        </div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-circle me-1"></i>Хадгалах
      </button>
      <a href="{{ request.referrer or url_for('water.register_sample') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i>Буцах
      </a>
    </div>
  </form>
</div>
{% endblock %}
