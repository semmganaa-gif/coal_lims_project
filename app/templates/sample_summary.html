{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/sample_summary.css') }}">

<div class="page-wrap">
  <!-- Цэгцэлсэн Header -->
  <div class="summary-header">
    <div class="header-left">
      <h1><i class="bi bi-table text-primary"></i> {{ title }}</h1>
      <span class="badge bg-light text-dark">{{ samples|length }} дээж</span>
    </div>

    <div class="header-actions">
      {% if current_user.role in ['senior', 'admin'] %}
      <div class="btn-group">
        <button type="button" id="qcCompositeBtn" class="btn btn-sm btn-outline-warning" title="Composite vs Hourly дундаж харьцуулалт">
          <i class="bi bi-clipboard2-check"></i> Composite
        </button>
        <button type="button" id="qcNormBtn" class="btn btn-sm btn-outline-danger" title="Норм хязгаар шалгах">
          <i class="bi bi-rulers"></i> Norm Limit
        </button>
        <button type="button" id="correlationBtn" class="btn btn-sm btn-outline-info" title="Хамаарлын шинжилгээ">
          <i class="bi bi-graph-up"></i> Correlation
        </button>
      </div>

      <div class="btn-group">
        <button id="exportCsvBtn" class="btn btn-sm btn-success" title="CSV татах">
          <i class="bi bi-file-earmark-spreadsheet"></i> CSV
        </button>
        <button type="button" id="copySelectedBtn" class="btn btn-sm btn-outline-success" title="Сонгосоныг хуулах">
          <i class="bi bi-clipboard-check"></i> Хуулах
        </button>
      </div>

      <div class="btn-group">
        <a href="{{ url_for('api.mg_summary') }}" class="btn btn-sm btn-outline-dark" title="MG Magnetic нэгтгэл">
          <i class="bi bi-magnet"></i> MG
        </a>
        <a href="{{ url_for('api.audit_hub') }}" class="btn btn-sm btn-outline-primary" title="Аудит">
          <i class="bi bi-clock-history"></i> Аудит
        </a>
        <a href="{{ url_for('api.archive_hub') }}" class="btn btn-sm btn-outline-secondary" title="Архив Төв">
          <i class="bi bi-archive"></i> Архив
        </a>
      </div>

      <button type="button" id="reportBtn" class="btn btn-sm btn-danger" title="Сонгосоноос тайлан үүсгэх">
        <i class="bi bi-file-earmark-pdf"></i> Report
      </button>

      <button type="button" id="archiveBtn" class="btn btn-sm btn-info text-white" value="archive" title="Сонгосоныг архивлах">
        <i class="bi bi-archive-fill"></i> Архивлах
      </button>

      <button type="button" id="simulatorSendBtn" class="btn btn-sm btn-warning" title="Сонгосон дээжүүдийг CHPP Simulator руу илгээх">
        <i class="bi bi-cpu"></i> Simulator
      </button>
      {% elif current_user.role == 'manager' %}
      {# Manager зөвхөн Архив товч харна #}
      <a href="{{ url_for('api.archive_hub') }}" class="btn btn-sm btn-outline-secondary" title="Архив Төв">
        <i class="bi bi-archive"></i> Архив
      </a>
      {% endif %}

      <a href="{{ url_for('api.sample_summary') }}" class="btn btn-sm btn-outline-secondary" title="Шинэчлэх">
        <i class="bi bi-arrow-clockwise"></i>
      </a>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="card table-card">
      <form method="POST" action="{{ url_for('api.sample_summary') }}" id="limsForm"
            style="display:flex;flex-direction:column;height:100%;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div id="myGrid" class="ag-theme-alpine" style="width:100%;height:100%;"></div>
        <input type="hidden" name="sample_ids" id="selected_sample_ids">
        <input type="hidden" name="action" id="action_hidden">
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-theme-alpine.css">
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/dist/ag-grid-community.min.js"></script>

<script>
  const LIMS_CONFIG = {
    urls: {
      auditHub: "{{ url_for('api.audit_hub') }}",
      qcComposite: "{{ url_for('analysis.qc_composite_check') }}",
      qcNorm: "{{ url_for('analysis.qc_norm_limit') }}",
      qcCorr: "{{ url_for('analysis.correlation_check') }}",
      updateStatus: "/api/update_result_status",
      requestAnalysis: "/api/request_analysis",
      simulatorSendChpp: "/api/send_to_simulator/chpp",
      simulatorSendWtl: "/api/send_to_simulator/wtl"
    },
    analysisTypes: [
      {% for at in analysis_types %}
      { code: "{{ at.code }}", header: "{{ at.code|fmt_code }}" },
      {% endfor %}
    ],
    samplesData: [
      {%- for sample in samples -%}
      {
        "id": "{{ sample.id }}",
        "name": {{ (sample.sample_code or sample.name or sample.sample_name or None) | tojson }},
        "sample_code": {{ (sample.sample_code or None) | tojson }},
        "report_url": "{{ url_for('api.sample_report', sample_id=sample.id) }}",
        "client_name": {{ (sample.client_name or None) | tojson }},
        "sample_type": {{ (sample.sample_type or None) | tojson }},
        "received_date": {{ (sample.received_date.strftime('%Y-%m-%d %H:%M') if sample.received_date else None) | tojson }},
        "analysis_date": {{ (analysis_dates_map.get(sample.id) if analysis_dates_map.get(sample.id) else None) | tojson }}
        {%- for at in analysis_types %},
        "{{ at.code }}": {{ (results_map.get(sample.id, {}).get(at.code, None)) | tojson }}
        {%- endfor %}
      }{% if not loop.last %},{% endif %}
      {%- endfor %}
    ]
  };
</script>

<script src="{{ url_for('static', filename='js/calendar-module.js') }}"></script>
<script src="{{ url_for('static', filename='js/sample_summary.js') }}"></script>
{% endblock %}
