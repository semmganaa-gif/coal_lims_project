{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-award"></i> Шинэ PT бүртгэх</h2>

    <form method="POST" class="mt-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5>PT Program мэдээлэл</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>PT Provider *</label>
                            <input type="text" name="pt_provider" class="form-control"
                                   placeholder="ASTM, ISO LEAP, NIST" required>
                            <small class="form-text text-muted">Жишээ: ASTM D02 Coal PT</small>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>PT Program *</label>
                            <input type="text" name="pt_program" class="form-control"
                                   placeholder="Coal PT-2025" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Round Number</label>
                            <input type="text" name="round_number" class="form-control"
                                   placeholder="Round 1-2025">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>PT Sample Code</label>
                            <input type="text" name="sample_code" class="form-control"
                                   placeholder="PT-2025-001">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header bg-info text-white">
                <h5>Шинжилгээний үр дүн</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Analysis Code *</label>
                            <select name="analysis_code" class="form-control" required>
                                <option value="">-- Сонгох --</option>
                                <option value="Aad">Aad - Үнс</option>
                                <option value="Mad">Mad - Чийг</option>
                                <option value="Vad">Vad - Дэгдэмхий</option>
                                <option value="CV">CV - Илчлэг</option>
                                <option value="TS">TS - Хүхэр</option>
                                <option value="P">P - Фосфор</option>
                                <option value="F">F - Фтор</option>
                                <option value="Cl">Cl - Хлор</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Test Date *</label>
                            <input type="date" name="test_date" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Our Result *</label>
                            <input type="number" step="0.001" name="our_result"
                                   class="form-control" placeholder="10.25" required>
                            <small class="form-text text-muted">Бидний хэмжсэн утга</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Assigned Value *</label>
                            <input type="number" step="0.001" name="assigned_value"
                                   class="form-control" placeholder="10.30" required>
                            <small class="form-text text-muted">PT-ийн зөвт утга</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <label>Uncertainty (σ) *</label>
                            <input type="number" step="0.001" name="uncertainty"
                                   class="form-control" placeholder="0.15" required>
                            <small class="form-text text-muted">Standard deviation</small>
                        </div>
                    </div>
                </div>

                <div class="alert alert-info">
                    <strong>Z-Score тооцоолох томъёо:</strong><br>
                    Z = (Our Result - Assigned Value) / Uncertainty<br>
                    <small>Автомат тооцогдоно</small>
                </div>

                <div class="form-group">
                    <label>Тэмдэглэл</label>
                    <textarea name="notes" class="form-control" rows="3"
                              placeholder="Нэмэлт тайлбар..."></textarea>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-save"></i> Хадгалах
            </button>
            <a href="{{ url_for('quality.proficiency_list') }}" class="btn btn-secondary btn-lg">
                <i class="fas fa-times"></i> Болих
            </a>
        </div>
    </form>
</div>
{% endblock %}
