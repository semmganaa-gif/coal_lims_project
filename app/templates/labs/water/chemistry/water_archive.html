{% extends "base.html" %}

{% block title %}{{ _("Water Archive") }}{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/water_summary.css') }}">
<style>
  .archive-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0;
  }
  .archive-tabs .nav-link {
    font-weight: 600;
    color: #64748b;
    border-radius: 12px 12px 0 0;
    padding: 0.6rem 1.25rem;
    border: 1px solid transparent;
    border-bottom: none;
    background: rgba(255,255,255,0.5);
  }
  .archive-tabs .nav-link.active {
    background: white;
    color: #0f172a;
    border-color: rgba(148,163,184,0.15);
  }
  .archive-tabs .nav-link .badge {
    font-size: 0.7rem;
    margin-left: 0.35rem;
  }
  .tab-water.active { color: #3b82f6 !important; }
  .tab-micro.active { color: #20c997 !important; }
  .tab-combined.active { color: #8b5cf6 !important; }
</style>

<div class="ws-page-wrap" style="display:flex; flex-direction:column; height:calc(100vh - 120px);">
  <!-- Header -->
  <div class="ws-header">
    <div class="ws-header-left">
      <h1><i class="bi bi-archive-fill"></i> {{ _("Water Archive") }}</h1>
      <span class="badge bg-secondary" id="totalCount">0</span>
    </div>

    <div class="ws-header-actions">
      <!-- Export buttons -->
      <div class="btn-group">
        <button id="btnExportCsv" class="btn btn-sm btn-success" title="{{ _('Download CSV') }}">
          <i class="bi bi-file-earmark-spreadsheet me-1"></i>CSV
        </button>
        <button id="btnCopy" class="btn btn-sm btn-outline-success" title="{{ _('Copy selected') }}">
          <i class="bi bi-clipboard-check me-1"></i>{{ _("Copy") }}
        </button>
      </div>

      {% if current_user.role in ['senior', 'admin'] %}
      <!-- Unarchive button -->
      <button type="button" id="btnUnarchive" class="btn btn-sm btn-warning" title="{{ _('Restore selected') }}">
        <i class="bi bi-box-arrow-up me-1"></i>{{ _("Restore") }}
      </button>
      {% endif %}

      <!-- Refresh & Back buttons -->
      <button id="btnRefresh" class="btn btn-sm btn-outline-primary" title="{{ _('Refresh') }}">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <a href="{{ url_for('water.water_summary', lab=request.args.get('lab')) }}" class="btn btn-sm btn-outline-secondary" title="{{ _('Go to Summary') }}">
        <i class="bi bi-arrow-left me-1"></i>{{ _("Summary") }}
      </a>
    </div>
  </div>

  <!-- Hidden form for unarchive action -->
  <form id="unarchiveForm" method="POST" action="{{ url_for('water.water_archive') }}" style="display:none;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="sample_ids" id="unarchiveSampleIds">
    <input type="hidden" name="action" value="unarchive">
  </form>

  <!-- Tabs -->
  <ul class="nav archive-tabs">
    <li class="nav-item">
      <button class="nav-link tab-water active" data-type="water">
        <i class="bi bi-droplet-fill"></i> {{ _("Water Chemistry") }}
        <span class="badge bg-primary" id="waterCount">0</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link tab-micro" data-type="microbiology">
        <i class="bi bi-bug-fill"></i> {{ _("Microbiology") }}
        <span class="badge bg-success" id="microCount">0</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link tab-combined" data-type="water & micro">
        <i class="bi bi-layers-fill"></i> {{ _("Combined") }}
        <span class="badge bg-info" id="combinedCount">0</span>
      </button>
    </li>
  </ul>

  <!-- Grid Card -->
  <div class="ws-grid-wrap" style="margin-top: 0; flex: 1; min-height: 300px;">
    <div class="ws-grid-card" style="border-top-left-radius: 0; height: 100%;">
      <div class="card-header">
        <h6 id="gridTitle">
          <i class="bi bi-droplet-fill" style="color:#3b82f6"></i> {{ _("Water Chemistry Archive") }}
        </h6>
        <span class="badge bg-light text-dark" id="rowCount">0</span>
      </div>
      <div class="ws-grid-body" style="height: calc(100vh - 280px); min-height: 300px;">
        <div id="waterArchiveGrid" class="ag-theme-alpine" style="width:100%; height:100%;"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-theme-alpine.css">
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/dist/ag-grid-community.min.js"></script>

<script>
  var WATER_ARCHIVE_CONFIG = {
    urls: {
      archiveData: "{{ url_for('water.archive_data') }}"
    },
    i18n: {
      registered: "{{ _('Registered') }}",
      chemNo: "{{ _('Chem No.') }}",
      microNo: "{{ _('Micro No.') }}",
      sampleName: "{{ _('Sample Name') }}",
      waterArchive: "{{ _('Water Chemistry Archive') }}",
      microArchive: "{{ _('Microbiology Archive') }}",
      combinedArchive: "{{ _('Combined Archive') }}",
      selectRowsCopy: "{{ _('Please select rows to copy.') }}",
      rowsCopied: "{{ _('rows copied!') }}",
      selectSamples: "{{ _('Please select samples to restore.') }}",
      restoreConfirm: "{{ _('Restore selected') }}",
      samples: "{{ _('samples?') }}"
    }
  };


</script>
<script src="{{ url_for('static', filename='js/water_utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/water_archive.js') }}"></script>
{% endblock %}
