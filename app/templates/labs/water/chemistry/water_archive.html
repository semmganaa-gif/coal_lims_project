{% extends "base.html" %}

{% block title %}Water Archive{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/water_summary.css') }}">
<style>
  .archive-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0;
  }
  .archive-tabs .nav-link {
    font-weight: 600;
    color: #64748b;
    border-radius: 12px 12px 0 0;
    padding: 0.6rem 1.25rem;
    border: 1px solid transparent;
    border-bottom: none;
    background: rgba(255,255,255,0.5);
  }
  .archive-tabs .nav-link.active {
    background: white;
    color: #0f172a;
    border-color: rgba(148,163,184,0.15);
  }
  .archive-tabs .nav-link .badge {
    font-size: 0.7rem;
    margin-left: 0.35rem;
  }
  .tab-water.active { color: #3b82f6 !important; }
  .tab-micro.active { color: #20c997 !important; }
  .tab-combined.active { color: #8b5cf6 !important; }
</style>

<div class="ws-page-wrap" style="display:flex; flex-direction:column; height:calc(100vh - 120px);">
  <!-- Header -->
  <div class="ws-header">
    <div class="ws-header-left">
      <h1><i class="bi bi-archive-fill"></i> Water Archive</h1>
      <span class="badge bg-secondary" id="totalCount">0</span>
    </div>

    <div class="ws-header-actions">
      <!-- Export buttons -->
      <div class="btn-group">
        <button id="btnExportCsv" class="btn btn-sm btn-success" title="Download CSV">
          <i class="bi bi-file-earmark-spreadsheet me-1"></i>CSV
        </button>
        <button id="btnCopy" class="btn btn-sm btn-outline-success" title="Copy selected">
          <i class="bi bi-clipboard-check me-1"></i>Copy
        </button>
      </div>

      {% if current_user.role in ['senior', 'admin'] %}
      <!-- Unarchive button -->
      <button type="button" id="btnUnarchive" class="btn btn-sm btn-warning" title="Restore selected">
        <i class="bi bi-box-arrow-up me-1"></i>Restore
      </button>
      {% endif %}

      <!-- Refresh & Back buttons -->
      <button id="btnRefresh" class="btn btn-sm btn-outline-primary" title="Refresh">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <a href="{{ url_for('water.water_summary', lab=request.args.get('lab')) }}" class="btn btn-sm btn-outline-secondary" title="Go to Summary">
        <i class="bi bi-arrow-left me-1"></i>Summary
      </a>
    </div>
  </div>

  <!-- Hidden form for unarchive action -->
  <form id="unarchiveForm" method="POST" action="{{ url_for('water.water_archive') }}" style="display:none;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="sample_ids" id="unarchiveSampleIds">
    <input type="hidden" name="action" value="unarchive">
  </form>

  <!-- Tabs -->
  <ul class="nav archive-tabs">
    <li class="nav-item">
      <button class="nav-link tab-water active" data-type="water">
        <i class="bi bi-droplet-fill"></i> Water Chemistry
        <span class="badge bg-primary" id="waterCount">0</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link tab-micro" data-type="microbiology">
        <i class="bi bi-bug-fill"></i> Microbiology
        <span class="badge bg-success" id="microCount">0</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link tab-combined" data-type="water & micro">
        <i class="bi bi-layers-fill"></i> Combined
        <span class="badge bg-info" id="combinedCount">0</span>
      </button>
    </li>
  </ul>

  <!-- Grid Card -->
  <div class="ws-grid-wrap" style="margin-top: 0; flex: 1; min-height: 300px;">
    <div class="ws-grid-card" style="border-top-left-radius: 0; height: 100%;">
      <div class="card-header">
        <h6 id="gridTitle">
          <i class="bi bi-droplet-fill" style="color:#3b82f6"></i> Water Chemistry Archive
        </h6>
        <span class="badge bg-light text-dark" id="rowCount">0</span>
      </div>
      <div class="ws-grid-body" style="height: calc(100vh - 280px); min-height: 300px;">
        <div id="waterArchiveGrid" class="ag-theme-alpine" style="width:100%; height:100%;"></div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-grid.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/styles/ag-theme-alpine.css">
<script src="https://cdn.jsdelivr.net/npm/ag-grid-community@29.3.0/dist/ag-grid-community.min.js"></script>

<script>
(function() {
  'use strict';

  let gridApi = null;
  let currentType = 'water';

  const TAB_CONFIG = {
    'water': { title: '<i class="bi bi-droplet-fill" style="color:#3b82f6"></i> Water Chemistry Archive' },
    'microbiology': { title: '<i class="bi bi-bug-fill" style="color:#20c997"></i> Microbiology Archive' },
    'water & micro': { title: '<i class="bi bi-layers-fill" style="color:#8b5cf6"></i> Combined Archive' }
  };

  // ── Utility functions ──
  function formatValue(code, val) {
    if (val == null || val === '') return '';
    var n = parseFloat(val);
    if (isNaN(n)) return String(val);
    if (Math.abs(n) < 0.01 && n !== 0) return n.toExponential(2);
    if (n === Math.floor(n)) return n.toString();
    return n.toFixed(n < 1 ? 3 : 2);
  }

  function formatLimit(limit) {
    if (!limit) return '';
    if (Array.isArray(limit)) {
      var lo = limit[0], hi = limit[1];
      if (lo !== null && hi !== null) return lo + '—' + hi;
      if (hi !== null) return '≤' + hi;
      if (lo !== null) return '≥' + lo;
    }
    return String(limit);
  }

  function isOverLimit(limit, value) {
    if (!limit || value == null) return false;
    var n = parseFloat(value);
    if (isNaN(n)) return false;
    if (Array.isArray(limit)) {
      var lo = limit[0], hi = limit[1];
      return (lo !== null && n < lo) || (hi !== null && n > hi);
    }
    return false;
  }

  function isWithinLimit(limit, value) {
    if (!limit || value == null) return false;
    var n = parseFloat(value);
    if (isNaN(n)) return false;
    if (Array.isArray(limit)) {
      var lo = limit[0], hi = limit[1];
      return !((lo !== null && n < lo) || (hi !== null && n > hi));
    }
    return false;
  }

  function isDetectFail(value) {
    if (value == null || value === '') return false;
    var s = String(value).trim().toLowerCase();
    if (['илрэсэн', 'илэрсэн', 'detected', '+'].includes(s)) return true;
    var n = parseFloat(value);
    return !isNaN(n) && n > 0;
  }

  function isDetectPass(value) {
    if (value == null || value === '') return false;
    var s = String(value).trim().toLowerCase();
    if (['илрээгүй', 'not detected', '-', '0'].includes(s)) return true;
    var n = parseFloat(value);
    return !isNaN(n) && n === 0;
  }

  // ── Column definitions (same as summary) ──
  const WATER_CHEM_COLUMNS = [
    { code: 'COLOR', shortName: 'Color', mns_limit: [null, 20], primary: true },
    { code: 'EC', shortName: 'EC', mns_limit: [null, 1000], primary: true },
    { code: 'PH', shortName: 'pH', mns_limit: [6.5, 8.5], primary: true },
    { code: 'F_W', shortName: 'F⁻', mns_limit: [0.7, 1.5], primary: true },
    { code: 'CL_FREE', shortName: 'Cl₂', mns_limit: [0.2, 0.3], primary: true },
    { code: 'HARD', shortName: 'Hard', mns_limit: [null, 7] },
    { code: 'NH4', shortName: 'NH₄⁺', mns_limit: [null, 1.5] },
    { code: 'NO2', shortName: 'NO₂⁻', mns_limit: [null, 1] },
    { code: 'FE_W', shortName: 'Fe', mns_limit: [null, 0.3] },
    { code: 'TDS', shortName: 'TDS', mns_limit: [null, 400] },
    { code: 'CL_W', shortName: 'Cl⁻', mns_limit: [null, 350] },
    { code: 'PO4', shortName: 'PO₄³⁻', mns_limit: [null, 5] },
    { code: 'BOD', shortName: 'BOD', mns_limit: [null, 20] },
    { code: 'SLUDGE_VOL', shortName: 'SV', mns_limit: [70, 80] },
    { code: 'SLUDGE_DOSE', shortName: 'SD', mns_limit: [2, 4] },
    { code: 'SLUDGE_INDEX', shortName: 'SI', mns_limit: [80, 150] }
  ];

  const MICRO_COLUMNS = [
    { code: 'cfu_avg', shortName: 'CFU', mns_limit: [null, 100], primary: true },
    { code: 'ecoli', shortName: 'E.coli', detect: true, primary: true },
    { code: 'salmonella', shortName: 'Salm', detect: true, primary: true },
    { code: 'cfu_22', shortName: '22°C', mns_limit: [null, 100] },
    { code: 'cfu_37', shortName: '37°C', mns_limit: [null, 100] },
    { code: 'air_cfu', shortName: 'AirCFU', mns_limit: [null, 3000] },
    { code: 'staph', shortName: 'S.aur', detect: true }
  ];

  function buildColumnDefs(labType) {
    var cols = [];
    var showChem = (labType === 'water' || labType === 'water & micro');
    var showMicro = (labType === 'microbiology' || labType === 'water & micro');

    // Checkbox
    cols.push({
      headerName: '', field: '_sel', checkboxSelection: true, headerCheckboxSelection: true,
      width: 40, minWidth: 40, maxWidth: 40, pinned: 'left', sortable: false, filter: false, resizable: false
    });

    // Record
    cols.push({
      headerName: 'Registered', field: 'received_date', width: 95, minWidth: 85, pinned: 'left',
      sortable: true, filter: 'agTextColumnFilter', floatingFilter: true,
      cellStyle: { fontWeight: '600', color: '#1e40af' }
    });

    // Chem No. - chemistry or combined only
    if (showChem) {
      cols.push({
        headerName: 'Chem No.', field: 'chem_lab_id', width: 90, minWidth: 90, maxWidth: 90, pinned: 'left',
        sortable: false, filter: 'agTextColumnFilter', floatingFilter: true, resizable: false,
        cellStyle: { textAlign: 'center', fontWeight: '600', color: '#3b82f6' }
      });
    }

    // Micro No. - micro or combined only
    if (showMicro) {
      cols.push({
        headerName: 'Micro No.', field: 'micro_lab_id', width: 95, minWidth: 95, maxWidth: 95, pinned: 'left',
        sortable: false, filter: 'agTextColumnFilter', floatingFilter: true, resizable: false,
        cellStyle: { textAlign: 'center', fontWeight: '600', color: '#10b981' }
      });
    }

    // Sample name
    cols.push({
      headerName: 'Sample Name', field: 'sample_name', width: 340, minWidth: 280, pinned: 'left',
      sortable: true, filter: 'agTextColumnFilter', floatingFilter: true
    });

    // Chemistry columns - chemistry or combined only
    if (showChem) {
      var chemChildren = [];
      for (var i = 0; i < WATER_CHEM_COLUMNS.length; i++) {
        var p = WATER_CHEM_COLUMNS[i];
        var colDef = {
          headerName: p.shortName, headerTooltip: 'MNS: ' + (formatLimit(p.mns_limit) || '-'),
          field: p.code, minWidth: 42, maxWidth: 70, sortable: false, filter: false,
          type: 'numericColumn', headerClass: 'chem-header',
          valueFormatter: (function(code) { return function(params) { return formatValue(code, params.value); }; })(p.code),
          cellClassRules: (function(limit) {
            return {
              'cell-over-limit': function(params) { return isOverLimit(limit, params.value); },
              'cell-within-limit': function(params) { return isWithinLimit(limit, params.value); },
              'cell-empty': function(params) { return params.value == null || params.value === ''; }
            };
          })(p.mns_limit)
        };
        if (!p.primary) colDef.columnGroupShow = 'open';
        chemChildren.push(colDef);
      }
      cols.push({ headerName: 'Chem ▸', headerClass: 'chem-header-group', marryChildren: false, children: chemChildren });
    }

    // Micro columns - micro or combined only
    if (showMicro) {
      var microChildren = [];
      for (var j = 0; j < MICRO_COLUMNS.length; j++) {
        var m = MICRO_COLUMNS[j];
        var isDetect = !!m.detect;
        var microColDef = {
          headerName: m.shortName, field: m.code, minWidth: 40, maxWidth: 65, sortable: false, filter: false,
          headerClass: 'micro-header',
          valueFormatter: (function(code) { return function(params) { return formatValue(code, params.value); }; })(m.code),
          cellClassRules: isDetect ? {
            'cell-detect-fail': function(params) { return isDetectFail(params.value); },
            'cell-detect-pass': function(params) { return isDetectPass(params.value); },
            'cell-empty': function(params) { return params.value == null || params.value === ''; }
          } : (function(limit) {
            return {
              'cell-over-limit': function(params) { return isOverLimit(limit, params.value); },
              'cell-within-limit': function(params) { return isWithinLimit(limit, params.value); },
              'cell-empty': function(params) { return params.value == null || params.value === ''; }
            };
          })(m.mns_limit)
        };
        if (!m.primary) microColDef.columnGroupShow = 'open';
        microChildren.push(microColDef);
      }
      cols.push({ headerName: 'Micro ▸', headerClass: 'micro-header-group', marryChildren: false, children: microChildren });
    }

    return cols;
  }

  function setGridData(rows) {
    if (!gridApi) return;
    try {
      if (typeof gridApi.setRowData === 'function') {
        gridApi.setRowData(rows);
      } else if (typeof gridApi.setGridOption === 'function') {
        gridApi.setGridOption('rowData', rows);
      } else if (typeof gridApi.applyTransaction === 'function') {
        gridApi.applyTransaction({ add: rows });
      }
    } catch (e) {
      console.error('Grid setData error:', e);
    }
  }

  function updateColumns(labType) {
    if (!gridApi) return;
    var newCols = buildColumnDefs(labType);
    try {
      if (typeof gridApi.setColumnDefs === 'function') {
        gridApi.setColumnDefs(newCols);
      } else if (typeof gridApi.setGridOption === 'function') {
        gridApi.setGridOption('columnDefs', newCols);
      }
    } catch (e) {
      console.error('Update columns error:', e);
    }
  }

  function loadData(labType) {
    currentType = labType || 'water';
    var url = "{{ url_for('water.archive_data') }}?lab_type=" + encodeURIComponent(currentType);
    document.getElementById('rowCount').textContent = '...';

    // Баганууд шинэчлэх
    updateColumns(currentType);

    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        console.log('Archive data:', data);
        document.getElementById('totalCount').textContent = data.total_count || 0;
        document.getElementById('waterCount').textContent = data.water_count || 0;
        document.getElementById('microCount').textContent = data.micro_count || 0;
        document.getElementById('combinedCount').textContent = data.combined_count || 0;
        document.getElementById('rowCount').textContent = (data.rows || []).length;
        document.getElementById('gridTitle').innerHTML = (TAB_CONFIG[currentType] || TAB_CONFIG['water']).title;
        setGridData(data.rows || []);
        // Баганы өргөнийг текстийн өргөнөөр тохируулах
        setTimeout(function() { if (gridApi) gridApi.autoSizeAllColumns(); }, 100);
      })
      .catch(function(err) {
        console.error('Load error:', err);
        document.getElementById('rowCount').textContent = '0';
      });
  }

  function getSelectedIds() {
    if (!gridApi) return [];
    return gridApi.getSelectedNodes().map(function(n) { return n.data.sample_id; });
  }

  function exportCsv() {
    if (!gridApi) return;
    gridApi.exportDataAsCsv({ fileName: 'water_archive_' + currentType.replace(/ /g, '_') + '_' + new Date().toISOString().slice(0,10) + '.csv' });
  }

  function copySelected() {
    if (!gridApi) return;
    var nodes = gridApi.getSelectedNodes();
    if (nodes.length === 0) { alert('Please select rows to copy.'); return; }
    var columns = gridApi.getAllDisplayedColumns().filter(function(c) { var id = c.getColId(); return id !== '_sel'; });
    var header = columns.map(function(c) { return c.getColDef().headerName || ''; }).join('\t');
    var dataRows = nodes.map(function(n) { return columns.map(function(c) { var v = n.data[c.getColId()]; return v != null ? v : ''; }).join('\t'); }).join('\n');
    if (navigator.clipboard) navigator.clipboard.writeText(header + '\n' + dataRows).then(function() { alert(nodes.length + ' rows copied!'); });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var gridDiv = document.getElementById('waterArchiveGrid');
    if (!gridDiv) return;

    var gridOptions = {
      columnDefs: buildColumnDefs('water'),
      rowData: [],
      defaultColDef: { resizable: true, sortable: true, filter: true, suppressMenu: true },
      rowHeight: 28, headerHeight: 32, groupHeaderHeight: 28, floatingFiltersHeight: 28,
      rowSelection: 'multiple', suppressCellFocus: true,
      getRowId: function(p) { return String(p.data.sample_id); },
      onGridReady: function(params) { gridApi = params.api; loadData('water'); }
    };

    try {
      if (typeof agGrid.createGrid === 'function') {
        agGrid.createGrid(gridDiv, gridOptions);
      } else {
        new agGrid.Grid(gridDiv, gridOptions);
      }
    } catch (e) {
      gridDiv.innerHTML = '<div style="padding:40px;text-align:center;color:#dc3545;">Grid error: ' + e.message + '</div>';
    }

    // Tab handlers
    var tabBtns = document.querySelectorAll('.archive-tabs .nav-link');
    for (var i = 0; i < tabBtns.length; i++) {
      tabBtns[i].addEventListener('click', function() {
        var allBtns = document.querySelectorAll('.archive-tabs .nav-link');
        for (var j = 0; j < allBtns.length; j++) {
          allBtns[j].classList.remove('active');
        }
        this.classList.add('active');
        loadData(this.dataset.type);
      });
    }

    // Button handlers
    var btnExport = document.getElementById('btnExportCsv');
    var btnCopy = document.getElementById('btnCopy');
    var btnRefresh = document.getElementById('btnRefresh');
    var btnUnarchive = document.getElementById('btnUnarchive');

    if (btnExport) btnExport.addEventListener('click', exportCsv);
    if (btnCopy) btnCopy.addEventListener('click', copySelected);
    if (btnRefresh) btnRefresh.addEventListener('click', function() { loadData(currentType); });
    if (btnUnarchive) {
      btnUnarchive.addEventListener('click', function() {
        var ids = getSelectedIds();
        if (ids.length === 0) { alert('Please select samples to restore.'); return; }
        if (!confirm('Are you sure you want to restore ' + ids.length + ' selected sample(s)?')) return;
        document.getElementById('unarchiveSampleIds').value = ids.join(',');
        document.getElementById('unarchiveForm').submit();
      });
    }
  });
})();
</script>
{% endblock %}
