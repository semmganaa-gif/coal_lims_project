{# Микробиологийн цаг хэмжигч — workspace_code: water/air/swab #}
<div class="collapse mb-3" id="microTimerPanel">
 <div class="card border-0 shadow-sm rounded-2xl overflow-hidden">
 <div class="card-header py-2 px-3 d-flex align-items-center justify-content-between bg-warn-gradient border-b border-amber-200"
>
 <span class="fw-bold text-[0.9rem] text-[#92400e]">
 <i class="bi bi-stopwatch-fill me-1"></i>{{ _("Timer") }}
 </span>
 <button type="button" class="btn-close btn-sm" data-bs-toggle="collapse" data-bs-target="#microTimerPanel" aria-label="Close"></button>
 </div>
 <div class="card-body p-3">
 <div class="d-flex flex-wrap gap-2 mb-3" id="microTimerPresets">
 {# Preset товчууд JS-ээр үүснэ #}
 </div>
 <div id="microTimerList" class="d-flex flex-wrap gap-3">
 {# Active timer-ууд энд харагдана #}
 </div>
 <div id="microTimerEmpty" class="text-muted small text-center py-2">
 <i class="bi bi-info-circle me-1"></i>{{ _("Click a preset button or add a new timer.") }}
 </div>
 </div>
 </div>
</div>

<style nonce="{{ csp_nonce }}">
 .micro-timer-card {
 background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
 padding: 0.75rem 1rem; min-width: 200px; max-width: 260px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.04);
 }
 .micro-timer-card .timer-name { font-weight: 700; font-size: 0.82rem; color: #1e293b; margin-bottom: 0.25rem; }
 .micro-timer-card .timer-display { font-size: 1.4rem; font-weight: 800; font-family: 'Courier New', monospace; color: #0f172a; }
 .micro-timer-card .timer-display.timer-done { color: #dc2626; animation: timerBlink 1s infinite; }
 @keyframes timerBlink { 0%,100%{opacity:1} 50%{opacity:0.3} }
 .micro-timer-card .btn-group .btn { font-size: 0.75rem; padding: 2px 8px; }
</style>

<script nonce="{{ csp_nonce }}">
(function() {
 const WS_CODE = '{{ workspace_code | default("water") }}';
 const STORAGE_PREFIX = 'tmr_MICRO_' + WS_CODE.toUpperCase() + '_';

 const PRESETS = {
 water: [
 { label: 'Incubation 37°C 24h', seconds: 86400 },
 { label: 'Incubation 22°C 48h', seconds: 172800 },
 { label: 'Salmonella 24h', seconds: 86400 },
 ],
 air: [
 { label: 'Incubation 37°C 48h', seconds: 172800 },
 { label: 'Mold 25°C 5 days', seconds: 432000 },
 ],
 swab: [
 { label: 'Incubation 37°C 24h', seconds: 86400 },
 { label: 'Incubation 37°C 48h', seconds: 172800 },
 ],
 };

 const presets = PRESETS[WS_CODE] || [];
 let timers = []; // { id, name, totalSec, remaining, running, intervalId, startedAt }
 let nextId = 1;

 function saveTimers() {
 const data = timers.map(t => ({
 id: t.id, name: t.name, totalSec: t.totalSec,
 remaining: t.remaining, running: t.running,
 startedAt: t.startedAt || null,
 }));
 sessionStorage.setItem(STORAGE_PREFIX + 'timers', JSON.stringify(data));
 }

 function loadTimers() {
 try {
 const raw = sessionStorage.getItem(STORAGE_PREFIX + 'timers');
 if (!raw) return;
 const data = JSON.parse(raw);
 data.forEach(d => {
 let remaining = d.remaining;
 if (d.running && d.startedAt) {
 const elapsed = Math.floor((Date.now() - d.startedAt) / 1000);
 remaining = Math.max(0, remaining - elapsed);
 }
 const t = { id: d.id, name: d.name, totalSec: d.totalSec, remaining: remaining, running: false, intervalId: null, startedAt: null };
 timers.push(t);
 if (d.running && remaining> 0) {
 startTimer(t);
 }
 if (nextId <= d.id) nextId = d.id + 1;
 });
 } catch(e) { /* ignore */ }
 }

 function fmtTime(sec) {
 if (sec <= 0) return '00:00:00';
 const h = Math.floor(sec / 3600);
 const m = Math.floor((sec % 3600) / 60);
 const s = sec % 60;
 return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
 }

 function playAlarm() {
 try {
 const ctx = new (window.AudioContext || window.webkitAudioContext)();
 [0, 0.3, 0.6].forEach(delay => {
 const osc = ctx.createOscillator();
 const gain = ctx.createGain();
 osc.connect(gain); gain.connect(ctx.destination);
 osc.frequency.value = 880;
 osc.type = 'sine';
 gain.gain.setValueAtTime(0.3, ctx.currentTime + delay);
 gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.25);
 osc.start(ctx.currentTime + delay);
 osc.stop(ctx.currentTime + delay + 0.25);
 });
 } catch(e) { /* silent fallback */ }
 }

 function startTimer(t) {
 if (t.running) return;
 t.running = true;
 t.startedAt = Date.now();
 t.intervalId = setInterval(() => {
 t.remaining--;
 if (t.remaining <= 0) {
 t.remaining = 0;
 clearInterval(t.intervalId);
 t.intervalId = null;
 t.running = false;
 t.startedAt = null;
 playAlarm();
 }
 renderTimers();
 saveTimers();
 }, 1000);
 saveTimers();
 }

 function pauseTimer(t) {
 if (!t.running) return;
 clearInterval(t.intervalId);
 t.intervalId = null;
 t.running = false;
 t.startedAt = null;
 saveTimers();
 }

 function resetTimer(t) {
 pauseTimer(t);
 t.remaining = t.totalSec;
 saveTimers();
 renderTimers();
 }

 function removeTimer(t) {
 pauseTimer(t);
 timers = timers.filter(x => x.id !== t.id);
 saveTimers();
 renderTimers();
 }

 function addTimer(name, seconds) {
 const t = { id: nextId++, name: name, totalSec: seconds, remaining: seconds, running: false, intervalId: null, startedAt: null };
 timers.push(t);
 startTimer(t);
 renderTimers();
 }

 function renderTimers() {
 const list = document.getElementById('microTimerList');
 const empty = document.getElementById('microTimerEmpty');
 if (!list) return;
 list.innerHTML = '';
 if (timers.length === 0) { empty.style.display = ''; return; }
 empty.style.display = 'none';
 timers.forEach(t => {
 const done = t.remaining <= 0 && !t.running;
 const card = document.createElement('div');
 card.className = 'micro-timer-card';
 card.innerHTML = `
 <div class="timer-name">${t.name}</div>
 <div class="timer-display ${done ? 'timer-done' : ''}">${fmtTime(t.remaining)}</div>
 <div class="btn-group mt-1 w-100">
 ${t.running
 ? '<button class="btn btn-outline-warning btn-sm tmr-pause"><i class="bi bi-pause-fill"></i></button>'
 : '<button class="btn btn-outline-success btn-sm tmr-start"><i class="bi bi-play-fill"></i></button>'}
 <button class="btn btn-outline-secondary btn-sm tmr-reset"><i class="bi bi-arrow-counterclockwise"></i></button>
 <button class="btn btn-outline-danger btn-sm tmr-remove"><i class="bi bi-x-lg"></i></button>
 </div>
 `;
 const startBtn = card.querySelector('.tmr-start');
 const pauseBtn = card.querySelector('.tmr-pause');
 if (startBtn) startBtn.onclick = () => { startTimer(t); renderTimers(); };
 if (pauseBtn) pauseBtn.onclick = () => { pauseTimer(t); renderTimers(); };
 card.querySelector('.tmr-reset').onclick = () => resetTimer(t);
 card.querySelector('.tmr-remove').onclick = () => removeTimer(t);
 list.appendChild(card);
 });
 }

 document.addEventListener('DOMContentLoaded', function() {
 const presetContainer = document.getElementById('microTimerPresets');
 if (!presetContainer) return;

 presets.forEach(p => {
 const btn = document.createElement('button');
 btn.className = 'btn btn-sm btn-outline-warning';
 btn.style.cssText = 'border-radius:10px; font-size:0.8rem; font-weight:600;';
 btn.innerHTML = '<i class="bi bi-stopwatch me-1"></i>' + p.label;
 btn.onclick = () => addTimer(p.label, p.seconds);
 presetContainer.appendChild(btn);
 });

 // "New timer" товч
 const addBtn = document.createElement('button');
 addBtn.className = 'btn btn-sm btn-outline-secondary';
 addBtn.style.cssText = 'border-radius:10px; font-size:0.8rem; font-weight:600;';
 addBtn.innerHTML = '<i class="bi bi-plus-circle me-1"></i>{{ _("New Timer") }}';
 addBtn.onclick = () => {
 const name = prompt('{{ _("Timer name:") }}', '{{ _("Custom timer") }}');
 if (!name) return;
 const minStr = prompt('{{ _("Duration (minutes):") }}', '60');
 const mins = parseInt(minStr);
 if (isNaN(mins) || mins <= 0) return;
 addTimer(name, mins * 60);
 };
 presetContainer.appendChild(addBtn);

 loadTimers();
 renderTimers();
 });
})();
</script>
