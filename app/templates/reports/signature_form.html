{% extends "base.html" %}

{% block title %}Гарын үсэг/Тамга нэмэх{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
  <div class="card border-0 shadow-sm mt-4">
    <div class="card-header bg-white border-0 py-3">
      <h5 class="mb-0">
        <i class="bi bi-plus-circle text-primary me-2"></i>
        Гарын үсэг/Тамга нэмэх
      </h5>
    </div>
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label">Төрөл <span class="text-danger">*</span></label>
          <select name="signature_type" class="form-select" required>
            <option value="signature">Гарын үсэг</option>
            <option value="stamp">Тамга</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required
                 placeholder="Жишээ: Б.Түвшинжаргал">
        </div>

        <div class="mb-3">
          <label class="form-label">Албан тушаал</label>
          <input type="text" name="position" class="form-control"
                 placeholder="Жишээ: Микробиологич">
        </div>

        <div class="mb-3">
          <label class="form-label">Лаб</label>
          <select name="lab_type" class="form-select">
            <option value="all">Бүх лаб</option>
            {% for key, val in lab_types.items() %}
            <option value="{{ key }}">{{ val }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Холбоотой хэрэглэгч</label>
          <select name="user_id" class="form-select">
            <option value="">-- Сонгохгүй --</option>
            {% for u in users %}
            <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">
          <label class="form-label">Зураг <span class="text-danger">*</span></label>
          <input type="file" name="image" class="form-control" accept="image/*" required>
          <div class="form-text">PNG, JPG (ил дэвсгэртэй зураг сайн)</div>
        </div>

        <div class="d-flex justify-content-between">
          <a href="{{ url_for('pdf_reports.signature_list') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i> Буцах
          </a>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i> Нэмэх
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
