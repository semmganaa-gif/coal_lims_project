{# AG Grid form for Free Moisture (FM) #}
{% import "analysis/partials/aggrid_macros.html" as aggrid_macros with context %}
{{ aggrid_macros.common_grid_css('fmGrid') | safe }}
{{ aggrid_macros.common_js_helpers(['m1','m2','m3']) | safe }}

<style>
  #fmGrid {
    margin-top: 20px;
    height: 65vh;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .ag-theme-alpine {
    --ag-font-size: 14px;
    --ag-font-family: "Noto Sans", sans-serif;
    --ag-border-color: #dee2e6;
    --ag-header-background-color: #f8f9fa;
  }
  .ag-theme-alpine .ag-header-cell {
    border-right: 1px solid #d0d0d0;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: 600;
  }
  .ag-theme-alpine .ag-cell {
    border-right: 1px solid #e9ecef;
    border-bottom: 1px solid #e9ecef;
  }
  .ag-theme-alpine .ag-cell-inline-editing {
    background-color: #fff !important;
    box-shadow: 0 0 0 2px #0d6efd !important;
    z-index: 100 !important;
  }
  .reject-badge {
    font-size: 0.7em;
    padding: 3px 6px;
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    display: inline-block;
    margin-top: 4px;
  }
</style>

{{ aggrid_macros.grid_container('fmGrid') | safe }}

<script src="{{ url_for('static', filename='js/aggrid_helpers.js') }}"></script>
<script>
(function(){
  'use strict';
  const ANALY_CODE = window.LIMS_ANALYSIS_CODE_RAW || 'FM';
  const DRAFT_KEY = `draft_inputs_${ANALY_CODE}_grid`;

  {{ aggrid_macros.dataset_block(include_client=True) | safe }}


  const sampleIndexMap = {};
  samples.forEach((s, idx) => { sampleIndexMap[s.id] = idx + 1; });

  function parseRaw(entry){
    if(!entry) return {};
    let raw = entry.raw_data || {};
    if(typeof raw === 'string'){
      try { raw = JSON.parse(raw); } catch(e){ raw = {}; }
    }
    return raw || {};
  }

  function toNumber(val){
    if(val === null || val === undefined || val === '') return null;
    const num = Number(val);
    return Number.isFinite(num) ? num : null;
  }

  function computeFm(src){
    const tray = toNumber(src.tray);
    const before = toNumber(src.before);
    const after = toNumber(src.after);
    if(tray == null || before == null || after == null) return null;
    const wetSample = before - tray;
    const drySample = after - tray;
    const loss = before - after;
    if(!Number.isFinite(wetSample) || !Number.isFinite(drySample) || wetSample <= 0 || drySample <= 0 || loss < 0){
      return null;
    }
    const wetPct = wetSample > 0 ? Number(((loss / wetSample) * 100).toFixed(2)) : null;
    const dryPct = drySample > 0 ? Number(((loss / drySample) * 100).toFixed(2)) : null;
    return {
      loss: Number(loss.toFixed(3)),
      wet_mass: Number(wetSample.toFixed(3)),
      dry_mass: Number(drySample.toFixed(3)),
      fm_wet: wetPct,
      fm_dry: dryPct
    };
  }

  function deriveRow(sample){
    const ex = existingResults[sample.id] || {};
    const raw = parseRaw(ex);
    const isSaved = ex.status === 'pending_review' || ex.status === 'approved';
    const row = {
      sample_idx: sampleIndexMap[sample.id],
      sample_id: sample.id,
      sample_code: sample.code,
      client_name: sample.client || '-',
      tray: toNumber(raw.tray_g ?? raw.tray ?? raw.tray_weight),
      before: toNumber(raw.before_g ?? raw.before ?? raw.weight_before),
      after: toNumber(raw.after_g ?? raw.after ?? raw.weight_after),
      savedLoss: null,
      savedFmWet: null,
      savedFmDry: null,
      is_saved: !!isSaved
    };
    if(isSaved){
      row.savedLoss = raw.loss_g != null ? toNumber(raw.loss_g) : null;
      const wetVal = raw.fm_wet_pct ?? raw.fm_wet ?? raw.fm_pct_wet;
      const dryVal = raw.fm_dry_pct ?? raw.fm_dry ?? raw.fm_pct;
      row.savedFmWet = wetVal != null ? toNumber(wetVal) : null;
      row.savedFmDry = dryVal != null ? toNumber(dryVal) : null;
      if(row.savedFmWet == null && row.savedFmDry == null){
        const computed = computeFm(row);
        if(computed){
          row.savedLoss = computed.loss;
          row.savedFmWet = computed.fm_wet;
          row.savedFmDry = computed.fm_dry;
        } else if(ex.final_result != null){
          row.savedFmWet = toNumber(ex.final_result);
        }
      } else if(row.savedFmWet == null){
        row.savedFmWet = toNumber(ex.final_result);
      }
      if(row.savedFmDry == null && row.savedFmWet != null && row.savedLoss != null){
        const computed = computeFm(row);
        if(computed){
          row.savedFmDry = computed.fm_dry;
        }
      }
    }
    return row;
  }

  const rowData = samples.map(deriveRow);

  const numParser = params => {
    const raw = params.newValue;
    if(raw === null || raw === undefined || raw === '') return null;
    const num = Number(String(raw).replace(',','.'));
    return Number.isFinite(num) ? num : null;
  };
  const editCol = {
    editable: p => !p.data.is_saved,
    valueParser: numParser,
    cellEditor: 'agTextCellEditor',
    cellEditorParams: { useFormatter: true },
    suppressKeyboardEvent: window.LIMS_AGGRID?.navHandlerFactory(['tray','before','after']) || (() => false),
    cellStyle: p => p.data.is_saved ? { backgroundColor:'#e9ecef' } : {}
  };

  const columnDefs = [
    { headerName:'№', field:'sample_idx', width:60, pinned:'left',
      cellStyle:{ textAlign:'center', fontWeight:'600', color:'#6c757d', display:'flex', alignItems:'center', justifyContent:'center' } },
    { headerName:'Sample', field:'sample_code', width:260, pinned:'left',
      cellRenderer:p=>{
        let html = `<div class="fw-semibold text-primary">${p.value}</div>`;
        html += `<div class="text-muted small">${p.data.client_name || '-'}</div>`;
        const rej = rejectedInfo[p.data.sample_id];
        if(rej){
          const label = (errorLabels && (errorLabels[rej.reason_code] || rej.reason)) || rej.reason || '';
          html += `<div class="reject-badge"><i class="bi bi-exclamation-triangle"></i> ${label}</div>`;
        }
        return html;
      },
      cellStyle:{ display:'flex', flexDirection:'column', justifyContent:'center', lineHeight:'1.2' } },
    { headerName:'Tray (g)', field:'tray', width:130, ...editCol, valueFormatter:p => p.value!=null ? Number(p.value).toFixed(3) : '' },
    { headerName:'Tray + wet sample (g)', field:'before', width:170, ...editCol, valueFormatter:p => p.value!=null ? Number(p.value).toFixed(3) : '' },
    { headerName:'Tray + dry sample (g)', field:'after', width:170, ...editCol, valueFormatter:p => p.value!=null ? Number(p.value).toFixed(3) : '' },
    { headerName:'Loss (g)', field:'savedLoss', width:120,
      valueFormatter:p => (p.data.is_saved && p.value != null) ? Number(p.value).toFixed(3) : '-',
      cellStyle:p=>{
        if(!p.data.is_saved) return { color:'#ccc', display:'flex', alignItems:'center', justifyContent:'center' };
        return { textAlign:'center', color:'#0d6efd', fontWeight:'600', backgroundColor:'#eff6ff', display:'flex', alignItems:'center', justifyContent:'center' };
      }},
    { headerName:'Free moisture % (wet)', field:'savedFmWet', width:150,
      valueFormatter:p => (p.data.is_saved && p.value != null) ? Number(p.value).toFixed(2) : '-',
      cellStyle:p=>{
        if(!p.data.is_saved || p.value == null) return { color:'#ccc', display:'flex', alignItems:'center', justifyContent:'center' };
        return { fontWeight:'bold', color:'#198754', display:'flex', alignItems:'center', justifyContent:'center' };
      }},
    { headerName:'Dry basis % (info)', field:'savedFmDry', width:150,
      valueFormatter:p => (p.data.is_saved && p.value != null) ? Number(p.value).toFixed(2) : '-',
      cellStyle:p=>{
        if(!p.data.is_saved || p.value == null) return { color:'#ccc', display:'flex', alignItems:'center', justifyContent:'center' };
        return { fontWeight:'600', color:'#6f42c1', backgroundColor:'#f5f0ff', display:'flex', alignItems:'center', justifyContent:'center' };
      }},
    { headerName:'', field:'actions', width:60, pinned:'right',
      cellRenderer:p=>`<button class="btn btn-outline-danger btn-sm border-0 py-0" onclick="removeSample(${p.data.sample_id})" title="Remove sample"><i class="bi bi-x-lg"></i></button>`,
      cellStyle:{ display:'flex', alignItems:'center', justifyContent:'center' } }
  ];

  function saveDrafts(){
    if(!window.fmGridApi) return;
    const drafts = {};
    window.fmGridApi.forEachNode(n => {
      if(!n.data.is_saved){
        drafts[n.data.sample_id] = { tray:n.data.tray, before:n.data.before, after:n.data.after };
      }
    });
    localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
  }

  function restoreDrafts(){
    try{
      const drafts = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      window.fmGridApi.forEachNode(n => {
        if(!n.data.is_saved){
          const d = drafts[n.data.sample_id];
          if(d){
            if(d.tray !== undefined) n.data.tray = d.tray;
            if(d.before !== undefined) n.data.before = d.before;
            if(d.after !== undefined) n.data.after = d.after;
          }
        }
      });
      window.fmGridApi.refreshCells({ force:true });
    }catch(e){}
  }

  const gridOptions = {
    theme:'legacy',
    columnDefs,
    rowData,
    defaultColDef: baseDefaultColDef,
    suppressRowTransform:true,
    singleClickEdit:true,
    stopEditingWhenCellsLoseFocus:true,
    enterNavigatesVertically:true,
    enterNavigatesVerticallyAfterEdit:true,
    onCellValueChanged: saveDrafts
  };

  document.addEventListener('DOMContentLoaded', ()=>{
    const el = document.querySelector('#fmGrid');
    if(el){
      window.fmGridApi = agGrid.createGrid(el, gridOptions);
      setTimeout(restoreDrafts, 100);
    }
  });

  window.removeSample = function(id){
    if(!confirm('Remove this sample from worksheet?')) return;
    const url = new URL(window.location.href);
    let ids = (url.searchParams.get('sample_ids') || '').split(',').filter(Boolean);
    ids = ids.filter(x => parseInt(x,10) !== id);
    if(ids.length) url.searchParams.set('sample_ids', ids.join(','));
    else url.searchParams.delete('sample_ids');
    window.location.href = url.toString();
  };

  window.collectFmGridData = function(){
    if(!window.fmGridApi) return [];
    const payload = [];
    window.fmGridApi.forEachNode(n => {
      if(n.data.is_saved) return;
      const calc = computeFm(n.data);
      if(!calc) return;
      payload.push({
        sample_id: parseInt(n.data.sample_id),
        analysis_code: ANALY_CODE,
        final_result: calc.fm_wet,
        raw_data: {
          tray_g: toNumber(n.data.tray),
          before_g: toNumber(n.data.before),
          after_g: toNumber(n.data.after),
          loss_g: calc.loss,
          wet_mass_g: calc.wet_mass,
          dry_mass_g: calc.dry_mass,
          fm_wet_pct: calc.fm_wet,
          fm_dry_pct: calc.fm_dry,
          formula_wet: 'FM(wet) = (m_water / m_wet) * 100',
          formula_dry: 'FM(dry) = (m_water / m_dry) * 100',
          final_basis: 'wet'
        }
      });
    });
    return payload;
  };

  function purgeDrafts(savedResults){
    if(!savedResults || !savedResults.length) return;
    try{
      const drafts = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      savedResults.forEach(r => { delete drafts[r.sample_id]; });
      localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
    }catch(e){}
  }

  window.updateFmGridAfterSave = function(savedResults){
    if(!window.fmGridApi || !savedResults) return;
    const savedMap = {}; savedResults.forEach(r => savedMap[r.sample_id] = r);
    window.fmGridApi.forEachNode(n => {
      const res = savedMap[n.data.sample_id];
      if(res){
        const raw = parseRaw(res);
        const computed = computeFm({
          tray: raw.tray_g ?? raw.tray ?? n.data.tray,
          before: raw.before_g ?? raw.before ?? n.data.before,
          after: raw.after_g ?? raw.after ?? n.data.after
        });
        n.data.is_saved = true;
        n.data.tray = toNumber(raw.tray_g ?? raw.tray ?? n.data.tray);
        n.data.before = toNumber(raw.before_g ?? raw.before ?? n.data.before);
        n.data.after = toNumber(raw.after_g ?? raw.after ?? n.data.after);
        n.data.savedLoss = raw.loss_g != null ? toNumber(raw.loss_g) : (computed ? computed.loss : n.data.savedLoss);
        const wetVal = raw.fm_wet_pct ?? raw.fm_pct_wet ?? raw.fm_pct ?? raw.fm;
        const dryVal = raw.fm_dry_pct ?? raw.fm_dry ?? null;
        n.data.savedFmWet = wetVal != null ? toNumber(wetVal) : (computed ? computed.fm_wet : toNumber(res.final_result));
        n.data.savedFmDry = dryVal != null ? toNumber(dryVal) : (computed ? computed.fm_dry : n.data.savedFmDry);
      }
    });
    window.fmGridApi.refreshCells({ force:true });
    purgeDrafts(savedResults);
    alert('Free Moisture results saved.');
  };

  window.LIMS_CALC = window.LIMS_CALC || {};
  const REGISTERED = { collect: window.collectFmGridData, afterSave: window.updateFmGridAfterSave };
  ['FM','fm','Fm'].forEach(code => { window.LIMS_CALC[code] = REGISTERED; });
})();
</script>
