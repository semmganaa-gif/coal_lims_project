{# AG Grid worksheet for Sulfur (TS / St,ad) with 2-row layout (p1/p2) #}

<style>
  #sulfurGrid {
    margin-top: 20px;
    height: 70vh;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .ag-theme-alpine {
    --ag-font-size: 14px;
    --ag-font-family: "Noto Sans", sans-serif;
    --ag-border-color: #dee2e6;
    --ag-header-background-color: #f8f9fa;
  }
  .ag-theme-alpine .ag-header-cell {
    border-right: 1px solid #d0d0d0;
    text-align: center;
    font-weight: 600;
  }
  .ag-theme-alpine .ag-cell {
    border-right: 1px solid #e9ecef;
    border-bottom: 1px solid #e9ecef;
  }
  .ag-theme-alpine .ag-cell-inline-editing {
    background-color: #fff !important;
    box-shadow: 0 0 0 2px #0d6efd !important;
    z-index: 100 !important;
  }
  .ag-theme-alpine .ag-cell-span {
    background-color: rgba(255,255,255,0.95) !important;
    backdrop-filter: blur(4px) !important;
    -webkit-backdrop-filter: blur(4px) !important;
    border-bottom: 1px solid #dee2e6 !important;
    z-index: 5 !important;
  }
  .reject-badge {
    font-size: 0.7em;
    padding: 3px 6px;
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    display: inline-block;
    margin-top: 4px;
  }
</style>

<div id="sulfurGrid" class="ag-theme-alpine"></div>

<script src="{{ url_for('static', filename='js/aggrid_helpers.js') }}"></script>
<script>
(function(){
  'use strict';
  const ANALY_CODE = window.LIMS_ANALYSIS_CODE_RAW || 'TS';
  const DRAFT_KEY = `draft_inputs_${ANALY_CODE}_grid`;
  const LIMIT_RULE = (window.LIMS_LIMITS && (window.LIMS_LIMITS[ANALY_CODE] || window.LIMS_LIMITS['TS'])) || { single: { limit: 0.05, mode: 'abs' } };

  const samples = [
    {% for sample in samples %}
    { id: {{ sample.id }}, sample_code: {{ sample.sample_code | tojson | safe }} }
    {% if not loop.last %},{% endif %}
    {% endfor %}
  ];
  const existingResults = {{ existing_results_map | tojson | safe }};
  const rejectedInfo = {{ rejected_samples_info | tojson | safe }};
  const errorLabels = {{ error_labels | tojson | safe }};

  const sampleIndexMap = {};
  samples.forEach((s, idx) => { sampleIndexMap[s.id] = idx + 1; });

  function parseRaw(entry){
    if(!entry) return {};
    let raw = entry.raw_data || {};
    if(typeof raw === 'string'){
      try { raw = JSON.parse(raw); } catch(e){ raw = {}; }
    }
    return raw || {};
  }

  function parseSavedRaw(saved){
    if(!saved) return {};
    let raw = saved.raw_data || {};
    if(typeof raw === 'string'){
      try { raw = JSON.parse(raw); } catch(e){ raw = {}; }
    }
    return raw || {};
  }

  function toNumber(val){
    if(val === null || val === undefined || val === '') return null;
    const num = Number(String(val).replace(',','.'));
    return Number.isFinite(num) ? num : null;
  }

  function limitFor(avg){
    if(LIMIT_RULE.single){
      return { limit: LIMIT_RULE.single.limit, mode: LIMIT_RULE.single.mode };
    }
    const bands = LIMIT_RULE.bands || [];
    if(!bands.length){
      return { limit: 0.05, mode: 'abs' };
    }
    if(avg == null){
      const first = bands[0];
      return { limit: first.limit, mode: first.mode };
    }
    for(const band of bands){
      if(avg <= band.upper){
        return { limit: band.limit, mode: band.mode };
      }
    }
    const last = bands[bands.length - 1];
    return { limit: last.limit, mode: last.mode };
  }

  function applyPairMeta(row){
    const r1 = toNumber(row.p1_result);
    const r2 = toNumber(row.p2_result);
    const both = r1 != null && r2 != null;
    const avg = both ? Number(((r1 + r2) / 2).toFixed(2)) : null;
    const diff = both ? Number(Math.abs(r1 - r2).toFixed(2)) : null;
    const limInfo = limitFor(avg);
    const effective = limInfo.mode === 'percent' && avg != null ? Math.abs(avg * limInfo.limit) : limInfo.limit;
    const exceeded = diff != null && effective != null ? diff > effective : false;
    row.avg = avg;
    row.diff = diff;
    row.limit_used = effective;
    row.limit_mode = limInfo.mode;
    row.t_exceeded = exceeded;
  }

  function buildRow(sample, raw, isSaved){
    const p1 = raw.p1 || {};
    const p2 = raw.p2 || {};
    const row = {
      sample_idx: sampleIndexMap[sample.id],
      sample_id: sample.id,
      sample_code: sample.sample_code,
      is_saved: !!isSaved,
      p1_weight: toNumber(p1.weight ?? p1.m1 ?? p1.mass),
      p1_result: toNumber(p1.result ?? p1.value),
      p2_weight: toNumber(p2.weight ?? p2.m1 ?? p2.mass),
      p2_result: toNumber(p2.result ?? p2.value),
      diff: raw.diff != null ? toNumber(raw.diff) : null,
      avg: raw.avg != null ? toNumber(raw.avg) : null,
      limit_used: raw.limit_used != null ? toNumber(raw.limit_used) : null,
      limit_mode: raw.limit_mode || null,
      t_exceeded: !!raw.t_exceeded
    };
    if(row.avg == null || row.diff == null){
      applyPairMeta(row);
    }
    return row;
  }

  const rowData = samples.map(sample => {
    const ex = existingResults[sample.id] || {};
    const raw = parseRaw(ex);
    const isSaved = ex.status === 'pending_review' || ex.status === 'approved';
    return buildRow(sample, raw, isSaved);
  });

  const navHandler = (window.LIMS_AGGRID && window.LIMS_AGGRID.navHandlerFactory([
    'p1_weight','p1_result','p2_weight','p2_result'
  ])) || (() => false);
  const numFmt3 = p => (p.value != null ? Number(p.value).toFixed(3) : '');
  const numFmt2 = p => (p.value != null ? Number(p.value).toFixed(2) : '');

  const editNumericCol = {
    editable: p => !p.data.is_saved,
    cellEditor: 'agTextCellEditor',
    cellEditorParams: { useFormatter: true },
    valueParser: p => toNumber(p.newValue),
    suppressKeyboardEvent: navHandler,
    cellStyle: p => p.data.is_saved ? { backgroundColor:'#e9ecef' } : {}
  };

  const columnDefs = [
    { headerName:'№', field:'sample_idx', width:60, pinned:'left',
      cellStyle:{ textAlign:'center', color:'#6c757d', fontWeight:'bold', display:'flex', alignItems:'center', justifyContent:'center' } },
    { headerName:'Дээжийн нэр', field:'sample_code', width:240, pinned:'left',
      cellStyle:{ display:'flex', flexDirection:'column', justifyContent:'center', lineHeight:'1.2' },
      cellRenderer:p=>{
        let html = `<div class="fw-semibold text-primary">${p.value}</div>`;
        const rej = rejectedInfo[p.data.sample_id];
        if(rej){
          const label = (errorLabels && (errorLabels[rej.reason_code] || rej.reason)) || rej.reason || '';
          html += `<div class="reject-badge"><i class="bi bi-exclamation-triangle"></i> ${label}</div>`;
        }
        return html;
      }
    },
    { headerName:'p1', children:[
      { headerName:'Жин (g)', field:'p1_weight', width:140, ...editNumericCol, valueFormatter:numFmt3,
        cellStyle:p=>{
          const base = editNumericCol.cellStyle(p);
          const bg = p.data.is_saved ? base : { backgroundColor:'#e3f2fd' };
          return p.data.is_saved ? base : bg;
        }},
      { headerName:'St,ad (%)', field:'p1_result', width:140, ...editNumericCol, valueFormatter:numFmt2,
        cellStyle:p=>{
          const base = editNumericCol.cellStyle(p);
          return p.data.is_saved ? base : { backgroundColor:'#e3f2fd' };
        }}
    ]},
    { headerName:'p2', children:[
      { headerName:'Жин (g)', field:'p2_weight', width:140, ...editNumericCol, valueFormatter:numFmt3,
        cellStyle:p=>{
          const base = editNumericCol.cellStyle(p);
          return p.data.is_saved ? base : { backgroundColor:'#fff3e0' };
        }},
      { headerName:'St,ad (%)', field:'p2_result', width:140, ...editNumericCol, valueFormatter:numFmt2,
        cellStyle:p=>{
          const base = editNumericCol.cellStyle(p);
          return p.data.is_saved ? base : { backgroundColor:'#fff3e0' };
        }}
    ]},
    { headerName:'Тохирц (T)', field:'diff', width:120,
      valueFormatter:p=> p.data.is_saved && p.value!=null ? numFmt2(p) : '-',
      cellStyle:p=>{
        if(!p.data.is_saved){
          return { color:'#adb5bd', display:'flex', alignItems:'center', justifyContent:'center' };
        }
        if(p.data.t_exceeded){
          return { color:'#dc3545', fontWeight:'bold', display:'flex', alignItems:'center', justifyContent:'center' };
        }
        return { color:'#6c757d', display:'flex', alignItems:'center', justifyContent:'center' };
      }
    },
    { headerName:'Дундаж', field:'avg', width:120,
      valueFormatter:p=> p.data.is_saved && p.value!=null ? numFmt2(p) : '-',
      cellStyle:p=>{
        if(!p.data.is_saved){
          return { color:'#adb5bd', display:'flex', alignItems:'center', justifyContent:'center' };
        }
        return { fontWeight:'bold', color:'#198754', backgroundColor:'#d1e7dd', display:'flex', alignItems:'center', justifyContent:'center' };
      }
    },
    { headerName:'', field:'actions', width:60, pinned:'right',
      cellRenderer:p=> `<button class="btn btn-outline-danger btn-sm border-0 py-0" onclick="removeSample(${p.data.sample_id})" title="Дээж устгах"><i class="bi bi-x-lg"></i></button>`,
      cellStyle:{ display:'flex', alignItems:'center', justifyContent:'center' } }
  ];

  function saveDrafts(){
    if(!window.sulfurGridApi) return;
    const drafts = {};
    window.sulfurGridApi.forEachNode(n => {
      if(!n.data.is_saved){
        drafts[n.data.sample_id] = {
          p1_weight: n.data.p1_weight,
          p1_result: n.data.p1_result,
          p2_weight: n.data.p2_weight,
          p2_result: n.data.p2_result
        };
      }
    });
    localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
  }

  function restoreDrafts(){
    try{
      const drafts = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      window.sulfurGridApi.forEachNode(n => {
        if(!n.data.is_saved){
          const draft = drafts[n.data.sample_id];
          if(draft){
            Object.assign(n.data, draft);
            applyPairMeta(n.data);
          }
        }
      });
      window.sulfurGridApi.refreshCells({ force:true });
    } catch(e){}
  }

  function recalcPair(sampleId){
    window.sulfurGridApi.forEachNode(n => {
      if(n.data.sample_id === sampleId){
        applyPairMeta(n.data);
      }
    });
    window.sulfurGridApi.refreshCells({ force:true });
  }

  function onCellValueChanged(params){
    if(['p1_weight','p1_result','p2_weight','p2_result'].includes(params.colDef.field)){
      recalcPair(params.data.sample_id);
    }
    saveDrafts();
  }

  const gridOptions = {
    theme:'legacy',
    columnDefs,
    rowData,
    defaultColDef:{ sortable:false, resizable:true, suppressMovable:true },
    suppressRowTransform:true,
    singleClickEdit:true,
    stopEditingWhenCellsLoseFocus:true,
    enterNavigatesVertically:true,
    enterNavigatesVerticallyAfterEdit:true,
    onCellValueChanged
  };

  document.addEventListener('DOMContentLoaded', ()=>{
    const el = document.querySelector('#sulfurGrid');
    if(el){
      window.sulfurGridApi = agGrid.createGrid(el, gridOptions);
      setTimeout(restoreDrafts, 80);
    }
  });

  window.removeSample = function(id){
    if(!confirm('Дээжийг ажлын хуудаснаас устгах уу?')) return;
    const url = new URL(window.location.href);
    let ids = (url.searchParams.get('sample_ids') || '').split(',').filter(Boolean);
    ids = ids.filter(x => parseInt(x, 10) !== id);
    if(ids.length) url.searchParams.set('sample_ids', ids.join(','));
    else url.searchParams.delete('sample_ids');
    window.location.href = url.toString();
  };

  window.collectSulfurGridData = function(){
    if(!window.sulfurGridApi) return [];
    const payload = [];
    window.sulfurGridApi.forEachNode(n => {
      if(n.data.is_saved) return;
      const sid = n.data.sample_id;
      const r1 = toNumber(n.data.p1_result);
      const r2 = toNumber(n.data.p2_result);
      if(r1 == null || r2 == null) return;
      const weight1 = toNumber(n.data.p1_weight);
      const weight2 = toNumber(n.data.p2_weight);
      const avg = Number(((r1 + r2) / 2).toFixed(2));
      const diff = Number(Math.abs(r1 - r2).toFixed(2));
      const limInfo = limitFor(avg);
      const effective = limInfo.mode === 'percent' && avg != null ? Math.abs(avg * limInfo.limit) : limInfo.limit;
      payload.push({
        sample_id: parseInt(sid, 10),
        analysis_code: ANALY_CODE,
        final_result: avg,
        raw_data: {
          p1: { weight: weight1, result: r1 },
          p2: { weight: weight2, result: r2 },
          avg: avg,
          diff: diff,
          limit_used: effective,
          limit_mode: limInfo.mode,
          t_exceeded: diff != null && effective != null ? diff > effective : false
        }
      });
    });
    return payload;
  };

  function purgeDrafts(savedResults){
    if(!savedResults || !savedResults.length) return;
    try{
      const drafts = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      savedResults.forEach(r => {
        delete drafts[r.sample_id];
      });
      localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts));
    }catch(e){}
  }

  window.updateSulfurGridAfterSave = function(savedResults){
    if(!window.sulfurGridApi || !savedResults) return;
    const savedMap = {};
    savedResults.forEach(r => { savedMap[r.sample_id] = r; });
    window.sulfurGridApi.forEachNode(n => {
      const saved = savedMap[n.data.sample_id];
      if(!saved) return;
      n.data.is_saved = true;
      const raw = parseSavedRaw(saved);
      const p1 = raw.p1 || {};
      const p2 = raw.p2 || {};
      n.data.p1_weight = toNumber(p1.weight ?? p1.m1 ?? p1.mass) ?? n.data.p1_weight;
      n.data.p1_result = toNumber(p1.result ?? p1.value) ?? n.data.p1_result;
      n.data.p2_weight = toNumber(p2.weight ?? p2.m1 ?? p2.mass) ?? n.data.p2_weight;
      n.data.p2_result = toNumber(p2.result ?? p2.value) ?? n.data.p2_result;
      n.data.avg = raw.avg != null ? toNumber(raw.avg) : n.data.avg;
      n.data.diff = raw.diff != null ? toNumber(raw.diff) : n.data.diff;
      n.data.limit_used = raw.limit_used != null ? toNumber(raw.limit_used) : n.data.limit_used;
      n.data.limit_mode = raw.limit_mode || n.data.limit_mode;
      n.data.t_exceeded = raw.t_exceeded ?? n.data.t_exceeded;
      applyPairMeta(n.data);
    });
    window.sulfurGridApi.refreshCells({ force:true });
    purgeDrafts(savedResults);
    alert('Сульфур (TS/St,ad) үр дүн хадгалагдлаа.');
  };

  window.LIMS_CALC = window.LIMS_CALC || {};
  const REG = { collect: window.collectSulfurGridData, afterSave: window.updateSulfurGridAfterSave };
  [ANALY_CODE, (ANALY_CODE || '').toUpperCase(), (ANALY_CODE || '').toLowerCase(), 'TS', 'St,ad'].forEach(code => {
    if(code) window.LIMS_CALC[code] = REG;
  });
})();
</script>
