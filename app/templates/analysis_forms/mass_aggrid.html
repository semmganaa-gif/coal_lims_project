{# app/templates/analysis_forms/mass_workspace_form.html #}
<div class="container-fluid p-0">

  <!-- 🧰 Толгой ба үйлдлүүд -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h4 class="mb-1">M — Масс оруулах ажлын талбар</h4>
      <div class="text-muted small">
        Статус нь <code>new</code> бөгөөд <code>analyses_to_perform</code> дотор <code>"m"</code> байгаа дээжүүд энд харагдана.
      </div>
    </div>

    <div class="d-flex flex-wrap gap-2 align-items-center">
      <!-- Жинтэй холбогдох -->
      <button id="btnConnectBalance" class="btn btn-outline-primary">
        <i class="bi bi-usb-plug"></i> Жинтэй холбогдох
      </button>
      <span id="balanceStatus" class="badge bg-secondary">Холбогдоогүй</span>

      <div class="vr mx-2"></div>

      <div class="form-check form-switch me-2">
        <input class="form-check-input" type="checkbox" id="toggleIncludeReady">
        <label class="form-check-label" for="toggleIncludeReady">Ready болсон дээжийг хамтад нь харах</label>
      </div>

      <input id="searchCode" class="form-control" placeholder="Дээжийн кодоор хайх" style="min-width:240px">

      <div class="form-check form-switch ms-1">
        <input class="form-check-input" type="checkbox" id="markReadyToggle" checked>
        <label class="form-check-label" for="markReadyToggle">Хадгалахдаа сонгосон дээжийг <strong>Mass Ready</strong> болгох</label>
      </div>

      <button id="btnRefresh" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-repeat"></i> Шинэчлэх
      </button>
      <button id="btnSave" class="btn btn-primary">
        <i class="bi bi-save"></i> Хадгалах
      </button>
    </div>
  </div>

  <!-- 📋 AG Grid -->
  <div id="massGrid" class="ag-theme-alpine"></div>

</div>

<style>
  #massGrid{
    margin-top: 12px;
    height: 70vh;
    min-height: 420px;
    width: 100%;
  }
  .mw-row-ready{background-color:#f7f7fb;}
  .mw-row-ready .ag-cell{background-color:#f7f7fb !important;}
  .mw-badge{font-size:.75rem}
</style>

<script src="{{ url_for('static', filename='js/aggrid_helpers.js') }}"></script>
<script src="{{ url_for('static', filename='js/serial_balance.js') }}"></script>
<script>
(() => {
  const gridEl     = document.getElementById('massGrid');
  const $btnRefresh= document.getElementById('btnRefresh');
  const $btnSave   = document.getElementById('btnSave');
  const $markReady = document.getElementById('markReadyToggle');
  const $toggleInc = document.getElementById('toggleIncludeReady');
  const $search    = document.getElementById('searchCode');
  const $btnConnect = document.getElementById('btnConnectBalance');
  const $balanceStatus = document.getElementById('balanceStatus');
  let gridApi = null;
  let balanceIntegration = null;

  const readyBadge = (isReady) => isReady
    ? '<span class="badge text-bg-success mw-badge">Ready</span>'
    : '<span class="badge text-bg-secondary mw-badge">New</span>';

  const columnDefs = [
    {
      headerName:'',
      width:55,
      checkboxSelection:true,
      headerCheckboxSelection:true,
      headerCheckboxSelectionFilteredOnly:true,
      pinned:'left',
      sortable:false,
      resizable:false
    },
    { headerName:'ID', field:'id', width:80, pinned:'left', cellClass:'text-muted' },
    { headerName:'Дээжийн код', field:'sample_code', minWidth:300,
      cellRenderer:p=>`<div class="d-flex flex-column gap-1">
          <span class="fw-semibold text-primary">${p.value || '-'}</span>
          <span class="text-muted small">${readyBadge(!!p.data.mass_ready)}</span>
        </div>` },
    { headerName:'Захиалагч', field:'client_name', minWidth:80, valueFormatter:p=>p.value || '-' },
    { headerName:'Төрөл', field:'sample_type', minWidth:80, valueFormatter:p=>p.value || '-' },
    { headerName:'Ирсэн огноо', field:'received_date', minWidth:140, valueFormatter:p=>p.value || '-' },
    { headerName:'Масс (g)', field:'weight', minWidth:160,
      editable:true,
      cellEditor:'agTextCellEditor',
      cellEditorParams:{ useFormatter:true },
      valueFormatter:p => p.value != null ? Number(p.value).toFixed(4) : '',
      valueParser: params => {
        const raw = params.newValue;
        if(raw === '' || raw === null || raw === undefined) return null;
        const num = Number(raw);
        return Number.isFinite(num) ? num : params.oldValue ?? null;
      },
      cellStyle:p => p.data.mass_ready ? { backgroundColor:'#f6f6f6' } : {}
    },
    { headerName:'Үйлдэл', field:'actions', width:220, pinned:'right',
      cellRenderer:p=>`
        <div class="btn-group btn-group-sm">
          <button class="btn btn-outline-secondary mass-action" data-action="update-weight" data-id="${p.data.id}" title="Жинг хадгалах">
            <i class="bi bi-arrow-repeat"></i>
          </button>
          <button class="btn btn-outline-warning mass-action" data-action="unready" data-id="${p.data.id}" title="Unready">
            <i class="bi bi-arrow-counterclockwise"></i>
          </button>
          <button class="btn btn-outline-danger mass-action" data-action="delete" data-id="${p.data.id}" title="Delete">
            <i class="bi bi-trash"></i>
          </button>
        </div>`,
      cellStyle:{ display:'flex', alignItems:'center', justifyContent:'center' }
    }
  ];

  const gridOptions = {
    columnDefs,
    rowData: [],
    defaultColDef:{ resizable:true, sortable:true, suppressMovable:true },
    suppressRowTransform:true,
    rowSelection:{ mode:'multiRow', enableClickSelection:true },
    rowClassRules:{ 'mw-row-ready': params => !!params.data.mass_ready },
    getRowId: params => String(params.data.id)
  };

  function setRowData(rows){
    if(gridApi){
      gridApi.setGridOption('rowData', rows);
    }
  }

  async function fetchEligible(){
    const inc = $toggleInc.checked ? '1' : '0';
    const q   = encodeURIComponent($search.value || '');
    if(gridApi) gridApi.showLoadingOverlay();
    try{
      const res = await fetch(`/api/mass/eligible?include_ready=${inc}&q=${q}`, { credentials:'same-origin' });
      const data = await res.json();
      setRowData(data.samples || []);
    }catch(err){
      console.error(err);
      toast('Өгөгдөл татахад алдаа гарлаа.', 'danger');
      setRowData([]);
    }finally{
      if(gridApi) gridApi.hideOverlay();
    }
  }

  $btnSave.addEventListener('click', async () => {
    if(!gridApi) return;
    gridApi.stopEditing();
    const selected = gridApi.getSelectedRows();
    if(!selected.length){
      toast('Дээж сонгоод, дээр жингээ оруулсны дараа хадгална уу.', 'warning');
      return;
    }
    const items = selected.map(row => {
      const payload = { sample_id: row.id };
      if(row.weight !== null && row.weight !== undefined && !Number.isNaN(row.weight)) {
        payload.weight = row.weight;
      }
      return payload;
    });
    try{
      const res = await fetch('/api/mass/save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        credentials:'same-origin',
        body: JSON.stringify({ items, mark_ready: !!$markReady.checked })
      });
      const data = await res.json();
      if(!res.ok || data.success === false){
        toast(data.message || data.error || 'Хадгалах үед алдаа гарлаа.', 'danger');
        return;
      }
      toast(data.message || 'Амжилттай хадгаллаа.', 'success');
      fetchEligible();
    }catch(err){
      console.error(err); toast('????????? ?????.', 'danger');
    }
  });

  gridEl.addEventListener('click', async (e) => {
    const btn = e.target.closest('.mass-action');
    if(!btn || !gridApi) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    if(!id || !action) return;
    const rowNode = gridApi.getRowNode(String(id));
    if(!rowNode) return;
    const row = rowNode.data || {};

    if(action === 'update-weight'){
      const w = Number(row.weight);
      if(!isFinite(w)){ toast('Массын утга буруу байна.', 'warning'); return; }
      try{
        const res = await fetch('/api/mass/update_weight', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
          body: JSON.stringify({ sample_id:Number(id), weight:w })
        });
        const js = await res.json();
        if(!res.ok || js.success === false){ toast(js.message || js.error || 'Алдаа.', 'danger'); return; }
        toast(js.message || 'Жин шинэчлэгдлээ.', 'success');
      }catch(err){ console.error(err); toast('Сүлжээний алдаа.', 'danger'); }
      return;
    }

    if(action === 'unready'){
      if(!confirm('Unready горим руу буцаах уу?')) return;
      try{
        const res = await fetch('/api/mass/unready', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
          body: JSON.stringify({ sample_ids:[Number(id)] })
        });
        const js = await res.json();
        if(!res.ok || js.success === false){ toast(js.message || js.error || 'Алдаа.', 'danger'); return; }
        toast(js.message || 'OK', 'success');
        fetchEligible();
      }catch(err){ console.error(err); toast('Сүлжээний алдаа.', 'danger'); }
      return;
    }

    if(action === 'delete'){
      if(!confirm('Дээжийг бүр мөсөн устгах уу?')) return;
      try{
        const res = await fetch('/api/mass/delete', {
          method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
          body: JSON.stringify({ sample_id:Number(id) })
        });
        const js = await res.json();
        if(!res.ok || js.success === false){ toast(js.message || js.error || 'Алдаа.', 'danger'); return; }
        toast(js.message || 'Дээж устлаа.', 'success');
        fetchEligible();
      }catch(err){ console.error(err); toast('Сүлжээний алдаа.', 'danger'); }
      return;
    }
  });

  $btnRefresh.addEventListener('click', fetchEligible);
  $toggleInc.addEventListener('change', fetchEligible);
  $search.addEventListener('keydown', (e)=>{ if(e.key==='Enter') fetchEligible(); });

  function toast(msg, type='info'){
    const el = document.createElement('div');
    el.className = `alert alert-${type} position-fixed top-0 end-0 m-3 shadow`;
    el.style.zIndex = 1080;
    el.innerHTML = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ============================================
  // ЖИНТЭЙ ХОЛБОГДОХ (Web Serial API)
  // ============================================

  // Жингийн статус шинэчлэх
  function updateBalanceStatus(message, type = 'secondary') {
    $balanceStatus.textContent = message;
    $balanceStatus.className = `badge bg-${type}`;
  }

  // Жинтэй холбогдох товч
  $btnConnect.addEventListener('click', async () => {
    if (!window.labBalance) {
      toast('Serial Balance модуль ачаалагдаагүй байна.', 'danger');
      return;
    }

    if (!window.labBalance.isSupported()) {
      toast('Web Serial API дэмжигдэхгүй байна. Chrome 89+ хөтөч ашиглана уу.', 'warning');
      return;
    }

    if (window.labBalance.isConnected) {
      // Салгах
      await window.labBalance.disconnect();
      $btnConnect.innerHTML = '<i class="bi bi-usb-plug"></i> Жинтэй холбогдох';
      $btnConnect.classList.remove('btn-success');
      $btnConnect.classList.add('btn-outline-primary');
      updateBalanceStatus('Холбогдоогүй', 'secondary');
      return;
    }

    // Холбогдох
    updateBalanceStatus('Холбогдож байна...', 'warning');

    const connected = await window.labBalance.connect();

    if (connected) {
      $btnConnect.innerHTML = '<i class="bi bi-usb-plug-fill"></i> Холбогдсон';
      $btnConnect.classList.remove('btn-outline-primary');
      $btnConnect.classList.add('btn-success');
      updateBalanceStatus('Холбогдсон', 'success');
      toast('Жинтэй амжилттай холбогдлоо! Масс баганад Enter дарж жин авна уу.', 'success');

      // Grid integration тохируулах
      if (gridApi) {
        balanceIntegration = new BalanceGridIntegration(window.labBalance);
        balanceIntegration.setGridApi(gridApi);
        balanceIntegration.weightColumnField = 'weight';
      }
    } else {
      updateBalanceStatus('Холбогдож чадсангүй', 'danger');
    }
  });

  // Жингийн callback-ууд
  if (window.labBalance) {
    window.labBalance.onStatusChange = (msg) => {
      console.log('Balance status:', msg);
    };

    window.labBalance.onError = (msg) => {
      toast(msg, 'warning');
    };

    window.labBalance.onDisconnect = () => {
      $btnConnect.innerHTML = '<i class="bi bi-usb-plug"></i> Жинтэй холбогдох';
      $btnConnect.classList.remove('btn-success');
      $btnConnect.classList.add('btn-outline-primary');
      updateBalanceStatus('Холболт салсан', 'secondary');
    };
  }

  // AG-Grid дээр Enter дарахад жин авах
  async function handleWeightCellEnter(params) {
    if (!window.labBalance || !window.labBalance.isConnected) {
      // Жин холбогдоогүй бол default үйлдэл
      return;
    }

    if (params.column.getColId() !== 'weight') {
      return;
    }

    // Жин татах
    updateBalanceStatus('Жин татаж байна...', 'warning');
    const weight = await window.labBalance.getStableWeight();

    if (weight !== null) {
      params.node.setDataValue('weight', weight);
      updateBalanceStatus(`${weight.toFixed(4)} g`, 'success');
      toast(`Жин: ${weight.toFixed(4)} g`, 'success');

      // Дараагийн мөр рүү шилжих
      const nextRowIndex = params.rowIndex + 1;
      const nextRow = gridApi.getDisplayedRowAtIndex(nextRowIndex);
      if (nextRow) {
        setTimeout(() => {
          gridApi.setFocusedCell(nextRowIndex, 'weight');
          gridApi.startEditingCell({ rowIndex: nextRowIndex, colKey: 'weight' });
        }, 100);
      }
    } else {
      updateBalanceStatus('Жин авч чадсангүй', 'danger');
    }
  }

  // Grid-ийн keydown event
  gridEl.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && window.labBalance && window.labBalance.isConnected) {
      const focusedCell = gridApi?.getFocusedCell();
      if (focusedCell && focusedCell.column.getColId() === 'weight') {
        e.preventDefault();
        e.stopPropagation();
        const rowNode = gridApi.getDisplayedRowAtIndex(focusedCell.rowIndex);
        if (rowNode) {
          await handleWeightCellEnter({
            column: focusedCell.column,
            rowIndex: focusedCell.rowIndex,
            node: rowNode
          });
        }
      }
    }
  });

  document.addEventListener('DOMContentLoaded', () => {
    gridApi = agGrid.createGrid(gridEl, gridOptions);
    fetchEligible();

    // Grid бэлэн болсны дараа balance integration тохируулах
    if (window.labBalance && window.labBalance.isConnected) {
      balanceIntegration = new BalanceGridIntegration(window.labBalance);
      balanceIntegration.setGridApi(gridApi);
    }
  });
})();
</script>
