{# Record Usage Modal - chemicals/partials/consume_modal.html #}
<div class="modal fade" id="consumeModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="consumeForm" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="modal-content">
        <div class="modal-header bg-warning bg-opacity-10">
          <h5 class="modal-title">
            <i class="bi bi-dash-circle text-warning me-2"></i>{{ _("Record Usage") }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">{{ _("Chemical") }}</label>
            <select name="chemical_id" id="consumeChemicalSelect" class="form-select" required>
              <option value="">-- {{ _("Select") }} --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("Quantity") }} <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="number" name="quantity_used" class="form-control" required
                     min="0.01" step="0.01" placeholder="0.00">
              <span class="input-group-text" id="consumeUnit">mL</span>
            </div>
            <small class="text-muted" id="consumeAvailable">{{ _("Available") }}: -</small>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("Purpose") }}</label>
            <input type="text" name="purpose" class="form-control"
                   placeholder="{{ _("e.g. Aad analysis") }}">
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("Analysis Code") }}</label>
            <input type="text" name="analysis_code" class="form-control"
                   placeholder="{{ _("e.g. Aad, CV, TS") }}">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
          <button type="submit" class="btn btn-warning">
            <i class="bi bi-check-lg me-1"></i>{{ _("Record") }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
// Consume modal logic
document.addEventListener('DOMContentLoaded', function() {
  const consumeModal = document.getElementById('consumeModal');
  const consumeSelect = document.getElementById('consumeChemicalSelect');
  const consumeUnit = document.getElementById('consumeUnit');
  const consumeAvailable = document.getElementById('consumeAvailable');
  const consumeForm = document.getElementById('consumeForm');

  if (consumeModal) {
    consumeModal.addEventListener('show.bs.modal', function() {
      // Load chemicals list
      fetch('/chemicals/api/search?q=&limit=100')
        .then(r => r.json())
        .then(data => {
          consumeSelect.innerHTML = '<option value="">-- {{ _("Select") }} --</option>';
          data.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.quantity} ${c.unit})`;
            opt.dataset.quantity = c.quantity;
            opt.dataset.unit = c.unit;
            consumeSelect.appendChild(opt);
          });
        });
    });

    consumeSelect.addEventListener('change', function() {
      const selected = this.options[this.selectedIndex];
      if (selected.dataset.unit) {
        consumeUnit.textContent = selected.dataset.unit;
        consumeAvailable.textContent = `{{ _("Available") }}: ${selected.dataset.quantity} ${selected.dataset.unit}`;
      }
    });

    consumeForm.addEventListener('submit', function(e) {
      const chemId = consumeSelect.value;
      if (chemId) {
        this.action = `/chemicals/consume/${chemId}`;
      }
    });
  }
});
</script>
