{# Add Stock Modal - chemicals/partials/receive_modal.html #}
<div class="modal fade" id="receiveModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="receiveForm" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="modal-content">
        <div class="modal-header bg-success bg-opacity-10">
          <h5 class="modal-title">
            <i class="bi bi-plus-circle text-success me-2"></i>{{ _("Add Stock") }}
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">{{ _("Chemical") }}</label>
            <select name="chemical_id" id="receiveChemicalSelect" class="form-select" required>
              <option value="">-- {{ _("Select") }} --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("Quantity to Add") }} <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="number" name="quantity_add" class="form-control" required
                     min="0.01" step="0.01" placeholder="0.00">
              <span class="input-group-text" id="receiveUnit">mL</span>
            </div>
            <small class="text-muted" id="receiveCurrentStock">{{ _("Current Stock") }}: -</small>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("New Lot No.") }}</label>
            <input type="text" name="lot_number" class="form-control"
                   placeholder="{{ _("New batch number") }}">
          </div>
          <div class="mb-3">
            <label class="form-label">{{ _("New Expiry Date") }}</label>
            <input type="date" name="expiry_date" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{{ _("Cancel") }}</button>
          <button type="submit" class="btn btn-success">
            <i class="bi bi-check-lg me-1"></i>{{ _("Add") }}
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<script nonce="{{ csp_nonce }}">
// Receive modal logic
document.addEventListener('DOMContentLoaded', function() {
  const receiveModal = document.getElementById('receiveModal');
  const receiveSelect = document.getElementById('receiveChemicalSelect');
  const receiveUnit = document.getElementById('receiveUnit');
  const receiveCurrentStock = document.getElementById('receiveCurrentStock');
  const receiveForm = document.getElementById('receiveForm');

  if (receiveModal) {
    receiveModal.addEventListener('show.bs.modal', function() {
      // Load chemicals list
      fetch('/chemicals/api/search?q=&limit=100')
        .then(r => r.json())
        .then(data => {
          receiveSelect.innerHTML = '<option value="">-- {{ _("Select") }} --</option>';
          data.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            opt.textContent = `${c.name} (${c.quantity} ${c.unit})`;
            opt.dataset.quantity = c.quantity;
            opt.dataset.unit = c.unit;
            receiveSelect.appendChild(opt);
          });
        });
    });

    receiveSelect.addEventListener('change', function() {
      const selected = this.options[this.selectedIndex];
      if (selected.dataset.unit) {
        receiveUnit.textContent = selected.dataset.unit;
        receiveCurrentStock.textContent = `{{ _("Current Stock") }}: ${selected.dataset.quantity} ${selected.dataset.unit}`;
      }
    });

    receiveForm.addEventListener('submit', function(e) {
      const chemId = receiveSelect.value;
      if (chemId) {
        this.action = `/chemicals/receive/${chemId}`;
      }
    });
  }
});
</script>
