<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8">
    <title>{{ title }} - LIMS</title>
  </head>
  <body>
    <h1>"{{ user.username }}" хэрэглэгчийн мэдээллийг засах</h1>
    <form action="" method="post" novalidate>
      {{ form.hidden_tag() }}
      <p>
        {{ form.username.label }}:<br>
        {{ form.username(size=32) }}
      </p>
      <p>
        {{ form.password.label }}:<br>
        {{ form.password(size=32) }}
      </p>
      <p>
        {{ form.role.label }}:<br>
        {{ form.role() }}
      </p>
      <p>{{ form.submit() }}</p>
    </form>
    <hr>
    <a href="{{ url_for('main.manage_users') }}">Буцах</a>
  </body>
</html>
