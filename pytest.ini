[pytest]
# ============================================================================
# Pytest Configuration for Coal LIMS
# ============================================================================

# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command line options (default)
addopts =
    # Verbose output
    --verbose
    --strict-markers

    # Coverage options
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80

    # Show extra test summary
    -ra

    # Show locals in tracebacks
    --showlocals

    # Disable warnings summary (эсвэл --strict-warnings)
    --disable-warnings

# Test markers (тодорхой тест group ажиллуулахад)
markers =
    smoke: Smoke tests (санамсаргүй ажиллуулна)
    unit: Unit tests
    integration: Integration tests
    security: Security tests
    slow: Slow tests (skip by default)
    database: Tests requiring database
    api: API endpoint tests

# Minimum Python version
minversion = 3.8

# Plugins
plugins = flask

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */migrations/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Стандарт exclusions
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
